<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Trainer Remote</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #FFFFFF; 
            color: #333333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            width: 85%; 
            max-width: 350px; 
            text-align: center;
        }
        .logo-bottom-right {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 80px;
        }
        h2 { font-weight: 300; text-transform: uppercase; margin-bottom: 30px; color: #555; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 1rem;
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #8BC63F; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer;
        }
        #status { margin-top: 20px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Trainer Remote</h2>
    <input type="text" id="klantNaam" placeholder="Naam lid...">
    <button id="startBtn">Start Recovery</button>
    <div id="status">Gereed</div>
</div>

<img src="fit20-logo.png" class="logo-bottom-right" alt="Logo">

<script>
    const BIN_ID = 'JOUW_BIN_ID'; 
    const API_KEY = 'JOUW_API_KEY';

    document.getElementById('startBtn').addEventListener('click', async function() {
        const naam = document.getElementById('klantNaam').value;
        const status = document.getElementById('status');

        if (!naam) {
            alert("Vul een naam in");
            return;
        }

        status.innerText = "Verzenden naar tablet...";

        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify({ "user": naam, "program": "recovery" })
            });

            if (response.ok) {
                status.innerText = "Succes: " + naam + " gestart!";
                document.getElementById('klantNaam').value = "";
            } else {
                status.innerText = "Fout bij verzenden.";
            }
        } catch (e) {
            status.innerText = "Netwerkfout.";
        }
    });
</script>

</body>
</html>
