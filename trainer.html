<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Trainer Remote</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #1e1e1e; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            width: 90%; 
            max-width: 400px; 
            text-align: center;
            border: 1px solid #333;
        }
        h2 { color: #00AEEF; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #2a2a2a; 
            color: white; 
            font-size: 1.1rem;
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #00AEEF; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            cursor: pointer;
            transition: background 0.3s;
        }
        button:active { background-color: #0082b3; }
        #status { 
            margin-top: 20px; 
            font-size: 0.9rem; 
            color: #888; 
        }
        .logo { font-weight: bold; font-style: italic; color: #00AEEF; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <span class="logo">fit20 recovery</span>
    <h2>Trainer Paneel</h2>
    
    <input type="text" id="klantNaam" placeholder="Naam van het lid..." autofocus>
    
    <button onclick="stuurNaarStoel()">Start Recovery (10 min)</button>
    
    <div id="status">Gereed voor invoer</div>
</div>

<script>
    // VUL HIER JOUW GEGEVENS IN
    const BIN_ID = '69d00c00856a682189f8b7f6'; 
    const API_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';

    async function stuurNaarStoel() {
        const naam = document.getElementById('klantNaam').value;
        const statusDiv = document.getElementById('status');

        if (!naam) {
            alert("Vul eerst een naam in!");
            return;
        }

        statusDiv.innerText = "Verbinding maken met stoel...";
        statusDiv.style.color = "#00AEEF";

        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify({ 
                    "user": naam, 
                    "program": "recovery" 
                })
            });

            if (response.ok) {
                statusDiv.innerText = "Succes! " + naam + " kan plaatsnemen.";
                statusDiv.style.color = "#4CAF50";
                document.getElementById('klantNaam').value = ""; // Veld leegmaken
            } else {
                throw new Error("Verzendfout");
            }

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Fout: Controleer internetverbinding.";
            statusDiv.style.color = "#f44336";
        }
    }
</script>

</body>
</html>
