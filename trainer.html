<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Trainer Remote</title>
    <style>
        body { font-family: sans-serif; background: #FFF; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; text-align: center; padding: 20px; }
        .logo { position: fixed; bottom: 10px; right: 10px; width: 80px; opacity: 0.5; }
        h2 { font-weight: 300; text-transform: uppercase; color: #666; margin-bottom: 20px; }
        label { display: block; text-align: left; margin-bottom: 5px; font-size: 0.9rem; color: #888; }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; background: #f9f9f9; }
        button { width: 100%; padding: 20px; background: #8BC63F; color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(139,198,63,0.3); }
        #status { margin-top: 20px; font-size: 0.9rem; color: #999; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h2>fit20 Remote</h2>
        <label>Naam van het lid</label>
        <input type="text" id="klantNaam" placeholder="Typ naam..." autofocus>
        <label>Geslacht</label>
        <select id="gender">
            <option value="both">Neutraal / Beide</option>
            <option value="m">Man</option>
            <option value="v">Vrouw</option>
        </select>
        <label>Psychologisch Profiel</label>
        <select id="profile">
            <option value="all">Algemeen (A)</option>
            <option value="b">Prestatiegericht (B)</option>
            <option value="c">Gezondheid & Rust (C)</option>
        </select>
        <button id="startBtn">START RECOVERY</button>
        <div id="status">Systeem klaar voor gebruik</div>
    </div>
    <img src="fit20-logo.png" class="logo" alt="fit20">
    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        document.getElementById('startBtn').addEventListener('click', async function() {
            const naam = document.getElementById('klantNaam').value;
            const gender = document.getElementById('gender').value;
            const profile = document.getElementById('profile').value;
            const status = document.getElementById('status');
            if (!naam) return alert("Vul een naam in");
            status.innerText = "Verbinding maken...";
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                    body: JSON.stringify({ "user": naam, "program": "recovery", "gender": gender, "profile": profile })
                });
                if (response.ok) {
                    status.innerText = "Succes! " + naam + " is geactiveerd.";
                    document.getElementById('klantNaam').value = "";
                } else { status.innerText = "Fout bij verzenden."; }
            } catch (e) { status.innerText = "Netwerkfout."; }
        });
    </script>
</body>
</html>
