<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Trainer App v3.1</title>
    <style>
        :root { --fit20-green: #8BC63F; --antraciet: #333333; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 15px; color: var(--antraciet); position: relative; }
        .version-tag { position: absolute; bottom: 10px; right: 10px; font-size: 10px; color: #bbb; }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 950px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--fit20-green); text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr; gap: 15px; }
        .col { background: #fafafa; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 13px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 15px; margin-bottom: 10px; box-sizing: border-box; }
        .option { display: flex; align-items: center; margin-bottom: 6px; cursor: pointer; font-size: 13px; }
        .option input { margin-right: 8px; width: 16px; height: 16px; accent-color: var(--fit20-green); }
        #sendBtn { width: 100%; background: var(--fit20-green); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.3s; }
        #sendBtn:hover { background: #7ab335; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>
<div class="version-tag">v3.1</div>
<div class="container">
    <h2>Recovery Control v3.1</h2>
    <div class="grid">
        <div class="col">
            <label>Lid Naam:</label>
            <input type="text" id="fname" placeholder="Voornaam...">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Kalender:</label><input type="number" id="calAge"></div>
                <div><label>fit20 Age:</label><input type="number" id="fitAge"></div>
            </div>
            <label>Totaal aantal sessies:</label>
            <input type="number" id="totalSessions" placeholder="bijv. 84">
        </div>

        <div class="col">
            <label>Taal / Language:</label>
            <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                <label class="option"><input type="radio" name="lang" value="nl" checked> NL</label>
                <label class="option"><input type="radio" name="lang" value="en"> EN</label>
            </div>

            <label>Geslacht:</label>
            <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                <label class="option"><input type="radio" name="gender" value="v" checked> Vrouw</label>
                <label class="option"><input type="radio" name="gender" value="m"> Man</label>
            </div>
            
            <label>Hoofddoelen (max 2):</label>
            <div id="profileGroup">
                <label class="option"><input type="checkbox" value="kracht" checked> Kracht & Conditie</label>
                <label class="option"><input type="checkbox" value="welzijn"> Lichaamsvorm & Welzijn</label>
                <label class="option"><input type="checkbox" value="pijn"> Pijn- & Klachtreductie</label>
                <label class="option"><input type="checkbox" value="mobiliteit"> Functionele mobiliteit</label>
            </div>
        </div>

        <div class="col">
            <label>Programma Onderdelen:</label>
            <div id="stepGroup">
                <label class="option"><input type="checkbox" value="recovery" checked> Deep Recovery (3m)</label>
                <label class="option"><input type="checkbox" value="results" checked> Jouw Resultaten (1m)</label>
                <label class="option"><input type="checkbox" value="science" checked> Wetenschap (2m)</label>
                <label class="option"><input type="checkbox" value="breathing" checked> Ademhaling (4m)</label>
                <label class="option"><input type="checkbox" value="end" checked> Eindboodschap (30s)</label>
            </div>
        </div>
    </div>
    <button id="sendBtn">START RECOVERY</button>
    <div id="status"></div>
</div>

<script>
    const BIN_ID = '69d00c00856a682189f8b7f6';
    const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';

    // Limiet op doelen (max 2)
    document.querySelectorAll('#profileGroup input').forEach(cb => {
        cb.addEventListener('change', () => {
            const checked = document.querySelectorAll('#profileGroup input:checked');
            if(checked.length > 2) cb.checked = false;
        });
    });

    document.getElementById('sendBtn').addEventListener('click', async () => {
        const name = document.getElementById('fname').value.trim();
        const cal = document.getElementById('calAge').value;
        const fit = document.getElementById('fitAge').value;
        const sessions = document.getElementById('totalSessions').value;

        if(!name || !cal || !fit || !sessions) return alert("Vul alle velden in (inclusief sessies)");

        const lang = document.querySelector('input[name="lang"]:checked').value;
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const profiles = Array.from(document.querySelectorAll('#profileGroup input:checked')).map(cb => cb.value);
        const steps = Array.from(document.querySelectorAll('#stepGroup input:checked')).map(cb => cb.value);

        if(steps.length === 0) return alert("Selecteer minimaal één programma onderdeel");

        const status = document.getElementById('status');
        status.innerText = "Bezig met verzenden...";
        status.style.color = "orange";

        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify({ 
                    user: name, 
                    calAge: cal, 
                    fitAge: fit, 
                    totalSessions: sessions,
                    lang: lang, 
                    genders: [gender], 
                    profiles: profiles, 
                    steps: steps, 
                    program: "recovery" 
                })
            });
            
            if(response.ok) {
                status.innerText = "Succesvol verzonden! Activeer nu de tablet.";
                status.style.color = "green";
            } else {
                throw new Error();
            }
        } catch (e) { 
            status.innerText = "Fout bij verzenden. Check internetverbinding."; 
            status.style.color = "red";
        }
    });
</script>
</body>
</html>
