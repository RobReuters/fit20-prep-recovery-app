<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Trainer Remote</title>
    <style>
        :root {
            --fit20-green: #8BC63F;
            --fit20-dark-bg: #1A1A1B;
            --fit20-card-bg: #252526;
            --text-main: #FFFFFF;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--fit20-dark-bg); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .logo-container {
            margin-bottom: 30px;
        }
        .logo-container img {
            max-width: 120px;
            height: auto;
        }

        .container { 
            background-color: var(--fit20-card-bg); 
            padding: 35px; 
            border-radius: 25px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.4); 
            width: 85%; 
            max-width: 380px; 
            text-align: center;
            border: 1px solid #333;
        }

        h2 { 
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main); 
            margin-bottom: 25px; 
            font-size: 1.3rem;
        }

        input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 25px; 
            border-radius: 12px; 
            border: 1px solid #444; 
            background: #2a2a2a; 
            color: white; 
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: var(--fit20-green);
            outline: none;
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background-color: var(--fit20-green); 
            color: #1a1a1b; /* Donkere tekst op groene knop */
            border: none; 
            border-radius: 12px; 
            font-size: 1.25rem; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        button:active { 
            background-color: #79ac36; 
            transform: scale(0.98);
        }

        #status { 
            margin-top: 25px; 
            font-size: 0.95rem; 
            color: #888; 
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="fit20-logo.png" alt="fit20 Logo">
    </div>

    <div class="container">
        <h2>Recovery Session</h2>
        
        <input type="text" id="klantNaam" placeholder="Naam van het lid..." autofocus>
        
        <button onclick="stuurNaarStoel()">Start 10 Min Recovery</button>
        
        <div id="status">Gereed voor activatie</div>
    </div>

    </body>
</html>
