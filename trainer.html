<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Trainer App v2.0</title>
    <style>
        :root { --fit20-green: #8BC63F; --antraciet: #333333; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 15px; color: var(--antraciet); position: relative; }
        .version-tag { position: absolute; bottom: 10px; right: 10px; font-size: 10px; color: #bbb; }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 900px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--fit20-green); text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .col { background: #fafafa; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 13px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 15px; margin-bottom: 10px; }
        .option { display: flex; align-items: center; margin-bottom: 6px; cursor: pointer; font-size: 13px; }
        .option input { margin-right: 8px; width: 16px; height: 16px; accent-color: var(--fit20-green); }
        #sendBtn { width: 100%; background: var(--fit20-green); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="version-tag">v2.0</div>
<div class="container">
    <h2>Recovery Control v2.0</h2>
    <div class="grid">
        <div class="col">
            <label>Lid Naam:</label>
            <input type="text" id="fname">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Kalender:</label><input type="number" id="calAge"></div>
                <div><label>fit20 Age:</label><input type="number" id="fitAge"></div>
            </div>
            <label>Geslacht:</label>
            <label class="option"><input type="radio" name="gender" value="v" checked> Vrouw</label>
            <label class="option"><input type="radio" name="gender" value="m"> Man</label>
        </div>
        <div class="col">
            <label>Hoofddoelen (max 2):</label>
            <div id="profileGroup">
                <label class="option"><input type="checkbox" value="kracht" checked> Kracht & Conditie</label>
                <label class="option"><input type="checkbox" value="welzijn"> Lichaamsvorm & Welzijn</label>
                <label class="option"><input type="checkbox" value="pijn"> Pijn- & Klachtreductie</label>
                <label class="option"><input type="checkbox" value="mobiliteit"> Functionele mobiliteit</label>
            </div>
        </div>
        <div class="col">
            <label>Programma-instelling:</label>
            <p style="font-size:12px; color:#666; margin-bottom:10px;">V2.0 gebruikt de vaste 10-minuten cyclus.</p>
            <div id="stepGroup" style="opacity:0.5; pointer-events:none;">
                <label class="option"><input type="checkbox" value="recovery" checked> Deep Recovery</label>
                <label class="option"><input type="checkbox" value="results" checked> Jouw Resultaten</label>
                <label class="option"><input type="checkbox" value="science" checked> Wetenschap</label>
                <label class="option"><input type="checkbox" value="breathing" checked> Ademhaling</label>
                <label class="option"><input type="checkbox" value="end" checked> Eindboodschap</label>
            </div>
        </div>
    </div>
    <button id="sendBtn">START SESSIE</button>
    <div id="status"></div>
</div>
<script>
    const BIN_ID = '69d00c00856a682189f8b7f6';
    const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
    document.getElementById('sendBtn').addEventListener('click', async () => {
        const name = document.getElementById('fname').value;
        const cal = document.getElementById('calAge').value;
        const fit = document.getElementById('fitAge').value;
        if(!name || !cal || !fit) return alert("Vul alles in");
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const profiles = Array.from(document.querySelectorAll('#profileGroup input:checked')).map(cb => cb.value);
        const steps = ["recovery","results","science","breathing","end"]; // Vaste 10m flow
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify({ user: name, calAge: cal, fitAge: fit, program: "recovery", genders: [gender], profiles: profiles, steps: steps })
            });
            document.getElementById('status').innerText = "Verzonden!";
        } catch (e) { document.getElementById('status').innerText = "Fout!"; }
    });
</script>
</body>
</html>
