<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Recovery Station</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --fit20-green: #8BC63F;
            --fit20-blue: #00AEEF;
            --fit20-magenta: #E6007E;
            --antraciet: #333333;
            --bg-white: #FFFFFF;
        }

        body {
            background-color: var(--bg-white);
            color: var(--antraciet);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .logo-bottom-right {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 120px;
            opacity: 0.8;
        }

        #content { text-align: center; }

        h1 {
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            font-size: 1.2rem;
            margin: 0;
        }

        .client-name {
            font-size: 4rem;
            font-weight: 700;
            margin: 10px 0 30px 0;
        }

        #timer {
            font-size: 10rem;
            font-weight: 800;
            color: var(--fit20-green);
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: #eee;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--fit20-green);
            transition: width 1s linear;
        }
    </style>
</head>
<body>
    <img src="fit20-logo.png" class="logo-bottom-right" alt="fit20 Logo">

    <div id="content">
        <h1>Welkom bij fit20</h1>
        <div class="client-name" id="display-name">Recovery</div>
        <div id="timer">00:00</div>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <script>
        const BIN_ID = 'JOUW_BIN_ID'; 
        const API_KEY = 'JOUW_API_KEY';

        async function checkInbox() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await response.json();
                const record = data.record;

                if (record.user && record.program === 'recovery') {
                    startRecovery(record.user);
                    resetInbox();
                }
            } catch (e) { console.error("Fout bij ophalen:", e); }
        }

        function startRecovery(name) {
            document.getElementById('display-name').innerText = name;
            let timeLeft = 600; // 10 minuten
            const timerDisplay = document.getElementById('timer');
            const progressBar = document.getElementById('progress-bar');

            const countdown = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                progressBar.style.width = ((600 - timeLeft) / 600 * 100) + '%';

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerDisplay.innerText = "Klaar!";
                }
                timeLeft--;
            }, 1000);
        }

        async function resetInbox() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify({ "user": "", "program": "idle" })
            });
        }

        setInterval(checkInbox, 3000);
    </script>
</body>
</html>
