<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Recovery</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #FFF; color: #333; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .logo { position: absolute; bottom: 30px; right: 30px; width: 120px; }
        #content { text-align: center; }
        h1 { font-weight: 300; text-transform: uppercase; color: #AAA; font-size: 1.2rem; margin: 0; }
        .name { font-size: 4.5rem; font-weight: 700; margin: 10px 0; }
        #timer { font-size: 10rem; font-weight: 800; color: #8BC63F; }
        .progress { position: absolute; bottom: 0; left: 0; width: 100%; height: 10px; background: #EEE; }
        #bar { width: 0%; height: 100%; background: #8BC63F; transition: width 1s linear; }
    </style>
</head>
<body>
    <div id="content">
        <h1>Welcome to fit20</h1>
        <div class="name" id="userName">Recovery</div>
        <div id="timer">00:00</div>
    </div>
    <div class="progress"><div id="bar"></div></div>
    <img src="fit20-logo.png" class="logo" alt="fit20">

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';

        async function checkInbox() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await res.json();
                if (data.record.user && data.record.program === 'recovery') {
                    startSession(data.record.user);
                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                        body: JSON.stringify({ "user": "", "program": "idle" })
                    });
                }
            } catch (e) { console.log("Polling..."); }
        }

        function startSession(name) {
            document.getElementById('userName').innerText = name;
            let time = 600;
            const timerEl = document.getElementById('timer');
            const barEl = document.getElementById('bar');
            
            const interval = setInterval(() => {
                let m = Math.floor(time / 60), s = time % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                barEl.style.width = `${((600 - time) / 600) * 100}%`;
                if (time-- <= 0) { clearInterval(interval); timerEl.innerText = "Done"; }
            }, 1000);
        }

        setInterval(checkInbox, 3000);
    </script>
</body>
</html>
