<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>fit20 Recovery</title>
    <style>
        :root {
            --fit20-green: #8BC63F;
            --antraciet: #333333;
            --light-gray: #eeeeee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: #FFFFFF; 
            color: var(--antraciet); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        /* Logo ECHT in de hoek, z-index 20 */
        .logo { 
            position: absolute; 
            bottom: 2vh; 
            right: 2vw; 
            width: 30vw; 
            max-width: 320px; 
            z-index: 20; 
        }

        #overallTimer {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 3vw;
            font-weight: 700;
            color: #ddd;
            z-index: 20;
        }

        /* Container smaller gemaakt (80%) voor meer zijruimte */
        .main-container {
            width: 80%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            z-index: 10;
        }

        #startActionBtn {
            padding: 8vh 15vw;
            background: var(--fit20-green);
            color: white; border: none; border-radius: 20px;
            font-size: 6vw; font-weight: bold;
            cursor: pointer; box-shadow: 0 15px 30px rgba(139, 198, 63, 0.4);
        }

        /* Cirkel styling */
        .visual-circle {
            width: 300px; height: 300px;
            border-radius: 50%;
            background: conic-gradient(var(--fit20-green) 0deg, var(--light-gray) 0deg);
            display: flex; justify-content: center; align-items: center;
            margin: 10vh 0; 
            position: relative;
            transition: transform 4s linear, background 4s linear;
            will-change: transform;
        }
        
        .visual-circle::after {
            content: "";
            width: 280px; height: 280px;
            background: white;
            border-radius: 50%;
            position: absolute;
        }

        #circleContent {
            z-index: 5;
            font-size: 4vw;
            font-weight: 800;
            color: var(--fit20-green);
        }

        .instruction-title { font-size: 4.5vw; font-weight: 700; margin-bottom: 2vh; color: var(--antraciet); z-index: 15; }
        
        /* BEPERKTE BREEDTE VOOR TEKSTEN OM LOGO TE VERMIJDEN */
        .sub-text { 
            font-size: 2.2vw; 
            color: #666; 
            width: 100%;
            max-width: 750px; /* Belangrijke fix: houdt tekst weg bij de hoeken */
            line-height: 1.5; 
            min-height: 3.5em; 
            z-index: 15; 
        }

        .progress { position: absolute; bottom: 0; left: 0; width: 100%; height: 15px; background: #eee; z-index: 20; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
