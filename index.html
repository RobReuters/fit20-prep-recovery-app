<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>fit20 Recovery</title>
    <style>
        :root {
            --fit20-green: #8BC63F;
            --antraciet: #333333;
            --soft-gray: #f9f9f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: #FFFFFF; 
            color: var(--antraciet); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        /* Logo rechtsonder */
        .logo { position: absolute; bottom: 2vh; right: 2vw; width: 25vw; max-width: 280px; z-index: 10; }

        /* Overall Timer linksboven */
        #overallTimer {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2.5vw;
            font-weight: 700;
            color: #ccc;
        }

        .main-container {
            width: 90%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        /* Grote Startknop voor trillende handen */
        #startActionBtn {
            padding: 8vh 15vw; /* Twee keer zo hoog gemaakt */
            background: var(--fit20-green);
            color: white; border: none; border-radius: 20px;
            font-size: 6vw; font-weight: bold;
            cursor: pointer; box-shadow: 0 15px 30px rgba(139, 198, 63, 0.4);
            transition: transform 0.1s;
        }
        #startActionBtn:active { transform: scale(0.95); }

        /* Box Breathing Animatie */
        .breath-circle {
            width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(139, 198, 63, 0.1);
            border: 4px solid var(--fit20-green);
            display: flex; justify-content: center; align-items: center;
            font-size: 2vw; font-weight: bold;
            transition: all 4s linear; /* De 4 seconden van de box */
            margin: 40px 0;
        }

        .breath-instruction { font-size: 4vw; font-weight: 700; margin-bottom: 20px; height: 1.2em; }
        .sub-text { font-size: 2vw; color: #888; max-width: 600px; height: 3em; }

        .progress { position: absolute; bottom: 0; left: 0; width: 100%; height: 15px; background: #eee; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overallTimer" class="hidden">OVERALL: <span id="timeVal">10:00</span></div>

    <div class="main-container" id="setupArea">
        <p style="text-transform: uppercase; letter-spacing: 2px; color: #999;">Welcome to the fit20 recovery program</p>
        <h1 id="userName" style="font-size: 6vw; margin: 2vh 0;">Hallo!</h1>
        <p class="sub-text" id="personalMsg">Wachten op activatie...</p>
        <button id="startActionBtn" class="hidden">START</button>
    </div>

    <div class="main-container hidden" id="prepArea">
        <div class="breath-instruction" id="breathTitle">Even tot rust komen...</div>
        <div class="breath-circle" id="circle">4</div>
        <p class="sub-text" id="breathSubText">Focus op je ademhaling en laat je schouders zakken.</p>
    </div>

    <div class="progress"><div id="bar"></div></div>
    <img src="fit20-logo.png" class="logo" alt="fit20">

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        
        let isSessionActive = false;
        let overallSeconds = 600;

        // Polling
        async function checkInbox() {
            if (isSessionActive) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${new Date().getTime()}`, { headers: { 'X-Master-Key': MASTER_KEY } });
                const data = await res.json();
                if (data.record.user && data.record.program === 'recovery') {
                    prepareSession(data.record.user);
                    await resetBin();
                }
            } catch (e) { console.log("Check..."); }
        }

        function prepareSession(name) {
            document.getElementById('userName').innerText = "Hallo " + name;
            document.getElementById('personalMsg').innerText = "Je hebt hard getraind vandaag. Goed gedaan! Ga rustig zitten en klik op 'Start'.";
            document.getElementById('startActionBtn').classList.remove('hidden');
        }

        document.getElementById('startActionBtn').addEventListener('click', function() {
            isSessionActive = true;
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('overallTimer').classList.remove('hidden');
            startOverallTimer();
            runBoxBreathing();
        });

        function startOverallTimer() {
            const display = document.getElementById('timeVal');
            const bar = document.getElementById('bar');
            const interval = setInterval(() => {
                let m = Math.floor(overallSeconds / 60), s = overallSeconds % 60;
                display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                bar.style.width = `${((600 - overallSeconds) / 600) * 100}%`;
                if (overallSeconds-- <= 0) { clearInterval(interval); location.reload(); }
            }, 1000);
        }

        async function runBoxBreathing() {
            const area = document.getElementById('prepArea');
            const title = document.getElementById('breathTitle');
            const sub = document.getElementById('breathSubText');
            const circle = document.getElementById('circle');
            area.classList.remove('hidden');

            // FASE 1: 30 Seconden rust
            let prepTime = 30;
            const prepInterval = setInterval(() => {
                title.innerText = "Moment voor jezelf...";
                circle.innerText = prepTime;
                if (prepTime === 20) sub.innerText = "Adem rustig in door je neus...";
                if (prepTime === 10) sub.innerText = "En langzaam uit door je mond...";
                if (prepTime-- <= 0) {
                    clearInterval(prepInterval);
                    startBoxCycles();
                }
            }, 1000);

            function startBoxCycles() {
                let phase = 0; // 0:In, 1:Hold, 2:Out, 3:Hold
                const phases = ["Adem in", "Vast houden", "Adem uit", "Vast houden"];
                const messages = ["Vul je longen...", "Ontspan je kaken...", "Laat alles los...", "Rustig blijven..."];
                
                let cycleTime = 4;
                const cycleInterval = setInterval(() => {
                    title.innerText = phases[phase];
                    sub.innerText = messages[phase];
                    circle.innerText = cycleTime;

                    // Animatie aansturing
                    if (phase === 0) { // Inademen
                        circle.style.transform = "scale(1.5)";
                        circle.style.background = "rgba(139, 198, 63, 0.3)";
                    } else if (phase === 2) { // Uitademen
                        circle.style.transform = "scale(1.0)";
                        circle.style.background = "rgba(139, 198, 63, 0.1)";
                    }

                    if (cycleTime-- <= 1) {
                        cycleTime = 4;
                        phase = (phase + 1) % 4;
                    }

                    // Stop Box Breathing na 3 minuten totaal (30 sec prep + 150 sec cycles)
                    // Voor nu laten we hem even doorlopen tot de overall timer ingrijpt of we voegen een stop toe
                }, 1000);
            }
        }

        async function resetBin() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify({ "user": "", "program": "idle" })
            });
        }

        setInterval(checkInbox, 3000);
    </script>
</body>
</html>
