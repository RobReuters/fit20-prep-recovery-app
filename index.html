<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>fit20 Recovery v3.0</title>
    <style>
        :root { --fit20-green: #8BC63F; --fit20-blue: #009DF4; --antraciet: #333333; --light-gray: #f0f0f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #FFF; color: var(--antraciet); font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        #vTag { position: absolute; bottom: 15px; left: 15px; font-size: 10px; color: #888; z-index: 1000; }
        .top-section { height: 10vh; width: 100%; padding: 20px; display: flex; justify-content: flex-start; }
        .middle-section { height: 70vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5vw; text-align: center; }
        .bottom-section { height: 20vh; width: 100%; position: relative; display: flex; justify-content: center; align-items: flex-end; }
        .logo { position: fixed; bottom: 4vh; right: 4vw; width: 20vw; max-width: 220px; z-index: 1000; }
        
        #overallTimer { font-size: 3vw; font-weight: 700; color: #ddd; }
        .progress { position: absolute; bottom: 0; width: 100%; height: 12px; background: #eee; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }

        .instruction-title { font-size: 4vw; font-weight: 700; margin-bottom: 2vh; }
        .sub-text { font-size: 1.8vw; color: #666; line-height: 1.4; max-width: 900px; min-height: 3em; }

        /* TIMELINE v3.0 */
        #timelineArea { width: 90vw; height: 350px; position: relative; overflow: hidden; display: flex; align-items: center; background: #fdfdfd; border-radius: 20px; }
        .timeline-track { position: absolute; height: 8px; background: #eee; left: 0; top: 50%; width: 5000px; transition: transform 15s cubic-bezier(0.2, 0, 0.2, 1); display: flex; align-items: center; }
        
        .milestone { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); top: 0; }
        .milestone-dot { width: 24px; height: 24px; background: #ddd; border-radius: 50%; border: 5px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .milestone.reached .milestone-dot { background: var(--fit20-green); }
        .milestone-label { font-size: 1.1vw; font-weight: bold; color: #aaa; white-space: nowrap; position: absolute; top: 35px; }
        .milestone.reached .milestone-label { color: var(--antraciet); }
        .milestone-count { font-size: 0.9vw; color: #ccc; position: absolute; top: -30px; }

        .current-marker { 
            position: fixed; left: 50%; top: 50%; width: 80px; height: 80px; 
            background: var(--fit20-blue); border-radius: 50%; 
            transform: translate(-50%, -50%); z-index: 100; 
            border: 6px solid white; box-shadow: 0 10px 25px rgba(0,157,244,0.4); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; 
        }
        .marker-val { font-size: 2.2vw; font-weight: 900; line-height: 1; }
        .marker-label { font-size: 0.8vw; font-weight: bold; opacity: 0.8; }

        /* AGE RESULTS */
        #resultsArea { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }
        .age-badge { background: var(--fit20-blue); color: white; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; clip-path: polygon(100% 50%, 94% 63%, 94% 77%, 82% 82%, 77% 94%, 63% 94%, 50% 100%, 37% 94%, 23% 94%, 18% 82%, 6% 77%, 6% 63%, 0% 50%, 6% 37%, 6% 23%, 18% 18%, 23% 6%, 37% 6%, 50% 0%, 63% 6%, 77% 6%, 82% 18%, 94% 23%, 94% 37%); font-size: 1.8vw; font-weight: 800; padding: 45px; text-align: center; opacity: 0; transform: scale(0.5); transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .age-badge.show { opacity: 1; transform: scale(1); }
        .meter-container { width: 100%; height: 44px; background: #eee; border-radius: 22px; position: relative; margin: 10vh 0 2vh 0; border: 3px solid white; }
        .meter-fill { height: 100%; background: var(--fit20-green); border-radius: 22px; position: absolute; top: 0; right: 0; width: 0%; transition: width 8s linear; }
        .age-display { position: absolute; top: -95px; display: flex; flex-direction: column; align-items: center; }
        .age-display .number { font-size: 5.5vw; font-weight: 900; color: var(--fit20-green); line-height: 1; }

        .visual-circle { width: 260px; height: 260px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; transition: transform 4s ease-in-out; background: var(--light-gray); }
        .visual-circle::after { content: ""; width: 220px; height: 220px; background: white; border-radius: 50%; position: absolute; z-index: 1; }
        .circle-number { z-index: 10; font-size: 80px; font-weight: 800; color: var(--fit20-green); position: relative; }
        .hidden { display: none !important; }
        .soft-fade { opacity: 0.1; transition: opacity 4s ease-in-out; }
    </style>
</head>
<body>
    <div id="vTag">v3.0</div>
    <div class="top-section"><div id="overallTimer" class="hidden"><span id="timeVal">--:--</span></div></div>

    <div class="middle-section" id="setupArea">
        <h1 id="userName" style="font-size: 6vw; margin-bottom: 2vh;">fit20 Recovery</h1>
        <p id="personalMsg" class="sub-text">Laden...</p>
        <button id="startActionBtn" class="hidden">START</button>
    </div>

    <div class="middle-section hidden" id="actionArea">
        <div class="instruction-title" id="mainTitle"></div>
        <div id="mainSubContainer" class="sub-text"></div>
        
        <div id="timelineArea" class="hidden">
            <div class="timeline-track" id="timelineTrack"></div>
            <div class="current-marker" id="userMarker">
                <span id="markerNum" class="marker-val">0</span>
                <span class="marker-label">Sessies</span>
            </div>
        </div>

        <div id="placeholderArea" class="hidden">
            <div class="visual-circle"><div class="circle-number">...</div></div>
        </div>

        <div id="resultsArea" class="hidden">
            <div class="age-badge" id="ageDiffBadge"></div>
            <div class="meter-container">
                <div class="age-display" style="left:0;"><span id="labelFit" style="font-size:1.2vw; color:#999; font-weight:bold;">fit20 Age</span><br><span id="dynamicAge" class="number">0</span></div>
                <div class="age-display" style="right:0;"><span id="labelCal" style="font-size:1.2vw; color:#999; font-weight:bold;">Kalender</span><br><span id="valCal" class="number">0</span></div>
                <div class="meter-fill" id="meterFill"></div>
            </div>
        </div>

        <div class="visual-circle" id="flowCircle"><div class="circle-number" id="flowCircleContent"></div></div>
        <div id="prepCountdown" class="hidden" style="font-size:15vw; font-weight:800; color:var(--fit20-green);"></div>
    </div>

    <div class="middle-section hidden" id="breathingArea">
        <div class="instruction-title" id="breathTitle"></div>
        <div style="display:flex; width:100%; align-items:center;">
            <div style="flex:2;"><img src="box-breathe-instructie.png" style="max-width:95%; max-height:48vh; border-radius:12px;"></div>
            <div style="flex:1;"><div class="visual-circle" id="breathCircle"><div class="circle-number" id="breathCircleContent">1</div></div></div>
        </div>
    </div>

    <div class="bottom-section"><img src="fit20-logo.png" class="logo"><div class="progress"><div id="bar"></div></div></div>

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        const CONTENT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?gid=0&single=true&output=csv';
        const LABELS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?gid=583309678&single=true&output=csv';
        const MILESTONES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?gid=1358156245&single=true&output=csv';

        let reservoir = [], labelsRaw = [], milestoneData = [], sessionData = { lang: 'nl' }, isSessionActive = false, currentLabels = {}, preSelectedTexts = {};

        function parseCSV(text) {
            return text.split(/\r?\n/).slice(1).map(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return cols.map(c => c.replace(/^"|"$/g, '').trim().replace(/""/g, '"'));
            });
        }

        async function loadData() {
            try {
                const [resC, resL, resM] = await Promise.all([fetch(CONTENT_URL+'&t='+Date.now()), fetch(LABELS_URL+'&t='+Date.now()), fetch(MILESTONES_URL+'&t='+Date.now())]);
                reservoir = parseCSV(await resC.text());
                labelsRaw = parseCSV(await resL.text());
                milestoneData = parseCSV(await resM.text());
                updateUILanguage();
            } catch (e) { document.getElementById('personalMsg').innerText = "Fout bij laden."; }
        }

        function updateUILanguage() {
            const langIdx = sessionData.lang === 'en' ? 2 : 1;
            labelsRaw.forEach(row => { if(row[0]) currentLabels[row[0]] = row[langIdx]; });
            document.getElementById('personalMsg').innerText = currentLabels.setup_msg || "Systeem gereed...";
            document.getElementById('startActionBtn').innerText = currentLabels.start_btn || "START";
        }

        async function checkInbox() {
            if (isSessionActive || reservoir.length === 0) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${Date.now()}`, { headers: { 'X-Master-Key': MASTER_KEY } });
                const data = await res.json();
                if (data.record.user && data.record.program === 'recovery') {
                    sessionData = data.record;
                    updateUILanguage();
                    document.getElementById('userName').innerText = (sessionData.lang === 'en' ? "Hello " : "Hallo ") + sessionData.user;
                    document.getElementById('personalMsg').innerText = currentLabels.ready_msg;
                    document.getElementById('startActionBtn').classList.remove('hidden');
                    ["a","b","c","d","e","f","g","h","i","j"].forEach(cat => preSelectedTexts[cat] = pickStaticText(cat));
                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify({ "user": "", "program": "idle" }) });
                }
            } catch (e) {}
        }

        function pickStaticText(cat) {
            const langIdx = sessionData.lang === 'en' ? [5, 6] : [3, 4];
            const matches = reservoir.filter(t => t[0] === cat && (t[1] === "both" || t[1] === sessionData.genders[0]) && (t[2] === "all" || sessionData.profiles.includes(t[2])));
            const pick = matches.length > 0 ? matches[Math.floor(Math.random() * matches.length)] : reservoir.find(t => t[0] === cat);
            return pick ? { title: pick[langIdx[0]], text: pick[langIdx[1]] } : { title: "", text: "" };
        }

        document.getElementById('startActionBtn').addEventListener('click', function() {
            isSessionActive = true;
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('actionArea').classList.remove('hidden');
            document.getElementById('overallTimer').classList.remove('hidden');
            document.getElementById('vTag').style.display = 'none';
            runMasterFlow();
        });

        function runMasterFlow() {
            const title = document.getElementById('mainTitle'), sub = document.getElementById('mainSubContainer');
            const pie = document.getElementById('flowCircle'), results = document.getElementById('resultsArea'), timeline = document.getElementById('timelineArea');
            let start = Date.now(), currentTimer = 600;

            const tInt = setInterval(() => {
                let m = Math.floor(currentTimer / 60), s = currentTimer % 60;
                document.getElementById('timeVal').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                document.getElementById('bar').style.width = `${((600 - currentTimer) / 600) * 100}%`;
                if (currentTimer-- <= 0) clearInterval(tInt);
            }, 1000);

            const masterInt = setInterval(() => {
                let elapsed = Date.now() - start;
                
                if (elapsed < 180000) {
                    const cat = ["a","b","c","d","e","f"][Math.floor(elapsed / 30000)];
                    title.innerText = preSelectedTexts[cat].title; sub.innerText = preSelectedTexts[cat].text;
                    let deg = ((elapsed % 30000) / 30000) * 360;
                    pie.style.background = `conic-gradient(var(--fit20-green) ${deg}deg, var(--light-gray) ${deg}deg)`;
                    return;
                }

                if (elapsed < 240000) {
                    let resElapsed = elapsed - 180000;
                    if (resElapsed < 20000) {
                        title.innerText = sessionData.lang === 'en' ? "Your fit20 Journey" : "Jouw fit20 Reis";
                        sub.innerText = sessionData.lang === 'en' ? "Every session strengthens your future." : "Elke sessie versterkt jouw toekomst.";
                        pie.classList.add('hidden'); timeline.classList.remove('hidden');
                        if (!timeline.dataset.started) { startTimeline(parseInt(sessionData.totalSessions || 0)); timeline.dataset.started = "true"; }
                        return;
                    }
                    if (resElapsed < 40000) {
                        timeline.classList.add('hidden'); document.getElementById('placeholderArea').classList.remove('hidden');
                        title.innerText = sessionData.lang === 'en' ? "Focus on Vitality" : "Focus op Vitaliteit";
                        sub.innerText = sessionData.lang === 'en' ? "Your effort today is your win tomorrow." : "Jouw inzet van vandaag is de winst van morgen.";
                        return;
                    }
                    document.getElementById('placeholderArea').classList.add('hidden');
                    results.classList.remove('hidden');
                    title.innerText = currentLabels.results_title; sub.innerText = currentLabels.results_sub;
                    document.getElementById('valCal').innerText = sessionData.calAge;
                    if (document.getElementById('meterFill').style.width !== "100%") {
                        setTimeout(() => { document.getElementById('meterFill').style.width = "100%"; animateAgeCount(parseInt(sessionData.calAge), parseInt(sessionData.fitAge)); }, 100);
                    }
                    return;
                }

                if (elapsed < 360000) {
                    results.classList.add('hidden'); pie.classList.remove('hidden');
                    const cat = ["g","h","i","j"][Math.floor((elapsed - 240000) / 30000)];
                    title.innerText = preSelectedTexts[cat].title; sub.innerText = preSelectedTexts[cat].text;
                    let deg = (((elapsed - 240000) % 30000) / 30000) * 360;
                    pie.style.background = `conic-gradient(var(--fit20-green) ${deg}deg, var(--light-gray) ${deg}deg)`;
                    return;
                }
                
                if (elapsed < 390000) {
                    title.innerText = currentLabels.prep_title; sub.innerText = currentLabels.prep_sub;
                    pie.classList.add('hidden'); document.getElementById('prepCountdown').classList.remove('hidden');
                    document.getElementById('prepCountdown').innerText = Math.ceil((390000 - elapsed) / 1000);
                    return;
                }
                
                clearInterval(masterInt);
                document.getElementById('actionArea').classList.add('hidden');
                document.getElementById('breathingArea').classList.remove('hidden');
                startBreathing();

            }, 500);
        }

        function startTimeline(total) {
            const track = document.getElementById('timelineTrack');
            const markerNum = document.getElementById('markerNum');
            const langIdx = sessionData.lang === 'en' ? 2 : 1;
            const spacing = 250; // pixels tussen mijlpalen
            
            track.innerHTML = "";
            milestoneData.forEach((ms, index) => {
                let div = document.createElement('div');
                div.className = "milestone " + (total >= parseInt(ms[0]) ? "reached" : "");
                div.style.left = (index * spacing + 500) + "px"; // Start offset
                div.innerHTML = `<div class="milestone-count">${ms[0]}</div><div class="milestone-dot"></div><div class="milestone-label">${ms[langIdx]}</div>`;
                track.appendChild(div);
            });

            // Animatie marker en track
            let cur = 0;
            const duration = 15000;
            const startTime = Date.now();

            const anim = setInterval(() => {
                let now = Date.now() - startTime;
                let progress = Math.min(now / duration, 1);
                let currentVal = Math.round(progress * total);
                markerNum.innerText = currentVal;

                // Zoek waar we zijn op de track
                let targetX = 0;
                milestoneData.forEach((ms, index) => {
                    if (currentVal >= parseInt(ms[0])) targetX = index * spacing;
                });

                track.style.transform = `translateX(-${targetX}px)`;

                if (progress >= 1) clearInterval(anim);
            }, 50);
        }

        function animateAgeCount(s, e) {
            let cur = s;
            const int = setInterval(() => {
                cur -= (s-e)/100; document.getElementById('dynamicAge').innerText = Math.round(cur);
                if(cur <= e) { 
                    clearInterval(int); document.getElementById('dynamicAge').innerText = e;
                    document.getElementById('ageDiffBadge').innerText = currentLabels.badge_text.replace('{diff}', (s-e));
                    document.getElementById('ageDiffBadge').classList.add('show');
                }
            }, 80);
        }

        function startBreathing() {
            const bArea = document.getElementById('breathingArea'), bTitle = document.getElementById('breathTitle'), bPie = document.getElementById('breathCircle'), bContent = document.getElementById('breathCircleContent');
            let step = 1, phase = 0, total = 210;
            const phases = sessionData.lang === 'en' ? ["Inhale (nose)", "Hold", "Exhale (mouth)", "Hold"] : ["Adem in (neus)", "Vast houden", "Adem uit (mond)", "Vast houden"];
            const bInt = setInterval(() => {
                bTitle.innerText = phases[phase]; bContent.innerText = step;
                if (phase === 0) bPie.style.transform = "scale(1.4)";
                if (phase === 2) bPie.style.transform = "scale(0.8)";
                if (total <= 6) bArea.classList.add('soft-fade');
                if (step++ >= 4) { step = 1; phase = (phase + 1) % 4; }
                if (total-- <= 0) { clearInterval(bInt); showFinal(); }
            }, 1000);
        }

        function showFinal() {
            document.getElementById('breathingArea').classList.add('hidden');
            const area = document.getElementById('actionArea');
            area.classList.remove('hidden');
            document.getElementById('mainTitle').innerText = currentLabels.end_title.replace('{user}', sessionData.user);
            document.getElementById('mainSubContainer').innerText = currentLabels.end_sub;
            const p = document.getElementById('flowCircle'); p.classList.remove('hidden'); p.className="visual-circle"; p.style.background="var(--light-gray)"; p.style.transform="none";
            document.getElementById('flowCircleContent').innerText = "✓";
            setTimeout(() => location.reload(), 30000);
        }

        loadData();
        setInterval(checkInbox, 3000);
    </script>
</body>
</html>
