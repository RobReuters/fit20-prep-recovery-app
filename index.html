<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>fit20 Recovery</title>
    <style>
        :root { --fit20-green: #8BC63F; --antraciet: #333333; --light-gray: #f0f0f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #FFF; color: var(--antraciet); font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .top-section { height: 10vh; width: 100%; padding: 20px; display: flex; justify-content: flex-start; z-index: 10; }
        .middle-section { height: 65vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5vw; position: relative; }
        .bottom-section { height: 25vh; width: 100%; position: relative; display: flex; justify-content: center; align-items: flex-end; z-index: 10; }
        .logo { position: absolute; bottom: 30px; right: 30px; width: 25vw; max-width: 250px; }
        #overallTimer { font-size: 3vw; font-weight: 700; color: #ddd; }
        .progress { position: absolute; bottom: 0; width: 100%; height: 12px; background: #eee; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }
        .instruction-title { font-size: 4vw; font-weight: 700; margin-bottom: 2vh; text-align: center; }
        .sub-text { font-size: 2.2vw; color: #666; line-height: 1.5; max-width: 850px; text-align: center; margin-bottom: 3vh; }

        /* RESULTATEN DASHBOARD */
        #resultsArea { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: opacity 1s; }
        .age-badge { background: var(--fit20-green); color: white; padding: 20px 40px; border-radius: 50px; font-size: 4vw; font-weight: 800; margin-bottom: 4vh; box-shadow: 0 10px 25px rgba(139,198,63,0.3); }
        .meter-container { width: 100%; height: 60px; background: #eee; border-radius: 30px; position: relative; overflow: visible; margin-top: 4vh; }
        .meter-fill { height: 100%; background: var(--fit20-green); border-radius: 30px; position: absolute; right: 0; width: 0%; transition: width 2s ease-out; }
        .age-label { position: absolute; top: -40px; font-weight: bold; font-size: 1.8vw; color: var(--antraciet); }
        .label-left { left: 0; }
        .label-right { right: 0; }

        /* ... overige styling voor cirkel en ademhaling ... */
        .visual-circle { width: 280px; height: 280px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; transition: transform 4s ease-in-out; background: var(--light-gray); }
        .visual-circle::after { content: ""; width: 240px; height: 240px; background: white; border-radius: 50%; position: absolute; z-index: 1; }
        .circle-number { z-index: 10; font-size: 90px; font-weight: 800; color: var(--fit20-green); position: relative; }
        #boxBreathingLayout { display: flex; width: 100%; height: 100%; align-items: center; justify-content: center; }
        .layout-left { flex: 2; display: flex; justify-content: center; align-items: center; }
        .layout-right { flex: 1; display: flex; justify-content: center; align-items: center; }
        .instruction-image { max-width: 90%; max-height: 55vh; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #prepCountdown { font-size: 18vw; font-weight: 800; color: var(--fit20-green); }
        #startActionBtn { padding: 4vh 8vw; background: var(--fit20-green); color: white; border: none; border-radius: 20px; font-size: 4vw; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="top-section"><div id="overallTimer" class="hidden"><span id="timeVal">10:00</span></div></div>

    <div class="middle-section" id="setupArea">
        <h1 id="userName" style="font-size: 6vw; margin-bottom: 2vh;">Laden...</h1>
        <p class="sub-text" id="personalMsg">Wachten op trainer...</p>
        <button id="startActionBtn" class="hidden">START</button>
    </div>

    <div class="middle-section hidden" id="actionArea">
        <div id="textOnlyHeader">
            <div class="instruction-title" id="mainTitle">...</div>
            <p class="sub-text" id="mainSubText">...</p>
        </div>
        
        <div id="resultsArea" class="hidden">
            <div class="age-badge" id="ageDiffBadge">- 0 JAAR</div>
            <div class="meter-container">
                <div class="age-label label-left">fit20 Age: <span id="valFit">0</span></div>
                <div class="age-label label-right">Kalender: <span id="valCal">0</span></div>
                <div class="meter-fill" id="meterFill"></div>
            </div>
            <p class="sub-text" style="margin-top: 6vh; font-style: italic;">"Je draait de biologische klok letterlijk terug."</p>
        </div>

        <div class="visual-circle" id="flowCircle"><div class="circle-number" id="flowCircleContent"></div></div>
        <div id="prepCountdown" class="hidden">30</div>
    </div>

    <div class="middle-section hidden" id="breathingArea">
        <div class="instruction-title" id="breathTitle">Adem in</div>
        <p class="sub-text">Volg het ritme...</p>
        <div id="boxBreathingLayout">
            <div class="layout-left"><img src="box-breathe-instructie.png" class="instruction-image"></div>
            <div class="layout-right"><div class="visual-circle" id="breathCircle"><div class="circle-number" id="breathCircleContent">1</div></div></div>
        </div>
    </div>

    <div class="bottom-section"><img src="fit20-logo.png" class="logo"><div class="progress"><div id="bar"></div></div></div>

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?gid=0&single=true&output=csv';

        let reservoir = [], sessionData = {}, selectedTexts = {}, isSessionActive = false, totalSessionSeconds = 600, currentTimer = 600;

        // ... loadReservoir() & checkInbox() ... (gelijk aan vorige, maar slaat calAge/fitAge op)
        async function loadReservoir() {
            try {
                let res = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
                let csvText = await res.text();
                const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
                reservoir = lines.slice(1).map(line => {
                    const c = line.includes(';') ? line.split(';') : line.split(',');
                    return { cat: c[0]?.trim().toLowerCase(), gender: c[1]?.trim().toLowerCase(), profile: c[2]?.trim().toLowerCase(), title: c[3]?.trim(), text: c[4]?.trim() };
                });
                document.getElementById('userName').innerText = "Systeem Gereed";
            } catch (e) {}
        }
        loadReservoir();

        async function checkInbox() {
            if (isSessionActive || reservoir.length === 0) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${Date.now()}`, { headers: { 'X-Master-Key': MASTER_KEY } });
                const data = await res.json();
                if (data.record.user && data.record.program === 'recovery') {
                    sessionData = data.record;
                    document.getElementById('userName').innerText = "Hallo " + sessionData.user;
                    document.getElementById('startActionBtn').classList.remove('hidden');
                    
                    let t = 0;
                    if(sessionData.steps.includes('recovery')) t += 180;
                    if(sessionData.steps.includes('results')) t += 60;
                    if(sessionData.steps.includes('science')) t += 120;
                    if(sessionData.steps.includes('breathing')) t += 240;
                    if(sessionData.steps.includes('end')) t += 60;
                    totalSessionSeconds = t; currentTimer = t;

                    selectedTexts = ["a","b","c","d","e","f","g","h","i","j"].reduce((acc, cat) => { acc[cat] = pickText(cat); return acc; }, {});
                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify({ "user": "", "program": "idle" }) });
                }
            } catch (e) {}
        }

        function pickText(cat) { /* ... gelijk ... */ }

        document.getElementById('startActionBtn').addEventListener('click', function() {
            isSessionActive = true;
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('actionArea').classList.remove('hidden');
            document.getElementById('overallTimer').classList.remove('hidden');
            const timerInt = setInterval(() => {
                let m = Math.floor(currentTimer / 60), s = currentTimer % 60;
                document.getElementById('timeVal').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                document.getElementById('bar').style.width = `${((totalSessionSeconds - currentTimer) / totalSessionSeconds) * 100}%`;
                if (currentTimer-- <= 0) { clearInterval(timerInt); location.reload(); }
            }, 1000);
            runMasterFlow();
        });

        function runMasterFlow() {
            const title = document.getElementById('mainTitle'), sub = document.getElementById('mainSubText'), pie = document.getElementById('flowCircle');
            const results = document.getElementById('resultsArea');
            let start = Date.now();
            
            const masterInt = setInterval(() => {
                let elapsed = Date.now() - start;
                let activeSteps = sessionData.steps;
                let currentTime = 0;

                if (activeSteps.includes('recovery')) {
                    if (elapsed < (currentTime + 180) * 1000) {
                        let localElapsed = elapsed - (currentTime * 1000);
                        let idx = Math.floor(localElapsed / 30000);
                        updateUI(selectedTexts[["a","b","c","d","e","f"][idx]], localElapsed % 30000);
                        return;
                    }
                    currentTime += 180;
                }

                if (activeSteps.includes('results')) {
                    if (elapsed < (currentTime + 60) * 1000) {
                        title.innerText = "Jouw Trainingsresultaten";
                        sub.innerText = `Chapeau ${sessionData.user}! Je traint momenteel op het niveau van een gemiddelde ${sessionData.fitAge}-jarige.`;
                        pie.classList.add('hidden');
                        results.classList.remove('hidden');
                        results.style.opacity = 1;
                        
                        // Vul data in
                        document.getElementById('valCal').innerText = sessionData.calAge;
                        document.getElementById('valFit').innerText = sessionData.fitAge;
                        const diff = sessionData.calAge - sessionData.fitAge;
                        document.getElementById('ageDiffBadge').innerText = `- ${diff} JAAR`;
                        
                        // Bereken percentage voor de meter (stel max verjonging is 40 jaar voor de schaal)
                        const perc = Math.min((diff / 40) * 100, 100);
                        setTimeout(() => document.getElementById('meterFill').style.width = perc + "%", 100);
                        return;
                    }
                    results.classList.add('hidden');
                    currentTime += 60;
                }

                if (activeSteps.includes('science')) {
                    if (elapsed < (currentTime + 120) * 1000) {
                        pie.classList.remove('hidden');
                        let localElapsed = elapsed - (currentTime * 1000);
                        let idx = Math.floor(localElapsed / 30000);
                        updateUI(selectedTexts[["g","h","i","j"][idx]], localElapsed % 30000);
                        return;
                    }
                    currentTime += 120;
                }

                // ... ademhaling en eindboodschap blijven gelijk ...
                if (activeSteps.includes('breathing')) {
                    if (elapsed < (currentTime + 30) * 1000) {
                        title.innerText = "Breng je adem tot rust";
                        sub.innerText = "Bereid je voor op de Box Breathing.";
                        pie.classList.add('hidden');
                        document.getElementById('prepCountdown').classList.remove('hidden');
                        document.getElementById('prepCountdown').innerText = Math.ceil(((currentTime + 30) * 1000 - elapsed) / 1000);
                        return;
                    }
                    currentTime += 30;
                    if (elapsed < (currentTime + 210) * 1000) {
                        clearInterval(masterInt);
                        document.getElementById('actionArea').classList.add('hidden');
                        document.getElementById('breathingArea').classList.remove('hidden');
                        startBreathing();
                        return;
                    }
                    currentTime += 210;
                }

                if (activeSteps.includes('end')) {
                    document.getElementById('actionArea').classList.remove('hidden');
                    document.getElementById('breathingArea').classList.add('hidden');
                    document.getElementById('prepCountdown').classList.add('hidden');
                    title.innerText = `Klaar voor de week, ${sessionData.user}!`;
                    sub.innerText = "Verlaat rustig de stoel. Geniet van je herstel.";
                    pie.classList.remove('hidden'); pie.style.background = "var(--light-gray)";
                    document.getElementById('flowCircleContent').innerText = "✓";
                }
            }, 50);

            function updateUI(data, ms) {
                if(!data) return;
                title.innerText = data.title; sub.innerText = data.text;
                let deg = (ms / 30000) * 360;
                pie.style.background = `conic-gradient(var(--fit20-green) ${deg}deg, var(--light-gray) ${deg}deg)`;
            }
        }

        function startBreathing() { /* ... gelijk ... */ }
        setInterval(checkInbox, 3000);
    </script>
</body>
</html>
