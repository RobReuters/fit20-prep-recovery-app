<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>fit20 Recovery</title>
    <style>
        :root {
            --fit20-green: #8BC63F;
            --antraciet: #333333;
            --soft-gray: #f9f9f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: #FFFFFF; 
            color: var(--antraciet); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        .logo { position: absolute; bottom: 2vh; right: 2vw; width: 25vw; max-width: 280px; z-index: 10; }

        /* Timer linksboven zonder 'Overall' */
        #overallTimer {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 3vw;
            font-weight: 700;
            color: #ddd;
        }

        .main-container {
            width: 90%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            transition: opacity 0.5s ease;
        }

        /* Grote Startknop voor trillende handen */
        #startActionBtn {
            padding: 8vh 15vw;
            background: var(--fit20-green);
            color: white; border: none; border-radius: 20px;
            font-size: 6vw; font-weight: bold;
            cursor: pointer; box-shadow: 0 15px 30px rgba(139, 198, 63, 0.4);
        }

        /* Box Breathing Animatie */
        .breath-circle {
            width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(139, 198, 63, 0.05);
            border: 6px solid var(--fit20-green);
            display: flex; justify-content: center; align-items: center;
            font-size: 3vw; font-weight: bold;
            transition: transform 4s linear, background 4s linear;
            margin: 4vh 0;
        }

        .instruction-title { font-size: 4.5vw; font-weight: 700; margin-bottom: 2vh; min-height: 1.2em; color: var(--antraciet); }
        .sub-text { font-size: 2.2vw; color: #777; max-width: 850px; line-height: 1.5; min-height: 3em; }

        .progress { position: absolute; bottom: 0; left: 0; width: 100%; height: 15px; background: #eee; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }
        
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 1s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="overallTimer" class="hidden"><span id="timeVal">10:00</span></div>

    <div class="main-container" id="setupArea">
        <p style="text-transform: uppercase; letter-spacing: 2px; color: #999;">Welcome to the fit20 recovery program</p>
        <h1 id="userName" style="font-size: 6vw; margin: 2vh 0;">Hallo!</h1>
        <p class="sub-text">Wachten op activatie door je trainer...</p>
        <button id="startActionBtn" class="hidden">START</button>
    </div>

    <div class="main-container hidden" id="actionArea">
        <div class="instruction-title" id="mainTitle">Lichaamsbewustzijn</div>
        <div id="visualElement">
            <div class="breath-circle" id="circle" style="border-color: #ddd;">...</div>
        </div>
        <p class="sub-text" id="mainSubText">Maak contact met je lichaam.</p>
    </div>

    <div class="progress"><div id="bar"></div></div>
    <img src="fit20-logo.png?v=2" class="logo" alt="fit20">

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        
        let isSessionActive = false;
        let overallSeconds = 600;

        async function checkInbox() {
            if (isSessionActive) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${new Date().getTime()}`, { headers: { 'X-Master-Key': MASTER_KEY } });
                const data = await res.json();
                if (data.record.user && data.record.program === 'recovery') {
                    document.getElementById('userName').innerText = "Hallo " + data.record.user;
                    document.getElementById('startActionBtn').classList.remove('hidden');
                    await resetBin();
                }
            } catch (e) { console.log("Check..."); }
        }

        document.getElementById('startActionBtn').addEventListener('click', function() {
            isSessionActive = true;
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('overallTimer').classList.remove('hidden');
            document.getElementById('actionArea').classList.remove('hidden');
            startOverallTimer();
            runPositiveFeedback();
        });

        function startOverallTimer() {
            const display = document.getElementById('timeVal');
            const bar = document.getElementById('bar');
            const interval = setInterval(() => {
                let m = Math.floor(overallSeconds / 60), s = overallSeconds % 60;
                display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                bar.style.width = `${((600 - overallSeconds) / 600) * 100}%`;
                if (overallSeconds-- <= 0) { clearInterval(interval); location.reload(); }
            }, 1000);
        }

        // --- FASE 1: POSITIVE FEEDBACK (2 MINUTEN) ---
        function runPositiveFeedback() {
            const title = document.getElementById('mainTitle');
            const sub = document.getElementById('mainSubText');
            const circle = document.getElementById('circle');
            
            let timeLeft = 120; 
            const feedbackInterval = setInterval(() => {
                circle.innerText = timeLeft;
                if (timeLeft > 100) {
                    title.innerText = "Geweldig gedaan";
                    sub.innerText = "Je hebt je lichaam zojuist een krachtige prikkel gegeven. Voel je hartslag... dit is je motor die op volle toeren werkt voor herstel.";
                } else if (timeLeft > 80) {
                    title.innerText = "Zelfgenezing";
                    sub.innerText = "Terwijl je hier zit, stroomt zuurstofrijk bloed naar je spieren. Je lichaam repareert en versterkt elke vezel die je hebt aangesproken.";
                } else if (timeLeft > 50) {
                    title.innerText = "Verjonging";
                    sub.innerText = "Groeihormonen komen nu vrij. Je bent niet alleen aan het herstellen, je bent je lichaam aan het verjongen en krachtiger aan het maken.";
                } else if (timeLeft > 20) {
                    title.innerText = "Bewondering";
                    sub.innerText = "Sta even stil bij de intelligentie van je cellen. Zonder dat je erover nadenkt, bouwt je lichaam nu aan een sterkere versie van jezelf.";
                } else if (timeLeft > 0) {
                    title.innerText = "Maak je klaar";
                    sub.innerText = "We gaan nu over naar de ademhaling om dit herstelproces verder te verdiepen. Ontspan je schouders.";
                }

                if (timeLeft-- <= 0) {
                    clearInterval(feedbackInterval);
                    runBoxBreathing();
                }
            }, 1000);
        }

        // --- FASE 2: BOX BREATHING (3 MINUTEN TOTAAL) ---
        function runBoxBreathing() {
            const title = document.getElementById('mainTitle');
            const sub = document.getElementById('mainSubText');
            const circle = document.getElementById('circle');
            circle.style.borderColor = "var(--fit20-green)";

            let totalBreathTime = 180; // 30 sec prep + 150 sec cycles
            let phase = -1; // -1 is prep
            let cycleStep = 4;
            let cyclePhase = 0; // 0:In, 1:Hold, 2:Out, 3:Hold

            const breathInterval = setInterval(() => {
                if (totalBreathTime > 150) {
                    // Prep fase (30 sec)
                    title.innerText = "Klaar voor de Box?";
                    sub.innerText = "Volg dadelijk de cirkel. Rustig in, vasthouden, rustig uit, vasthouden.";
                    circle.innerText = totalBreathTime - 150;
                } else {
                    // Cycle fase
                    const phases = ["Adem in", "Vast houden", "Adem uit", "Vast houden"];
                    const msgs = ["Vul je longen met energie...", "Laat de rust neerdalen...", "Laat alle spanning los...", "Geniet van de stilte..."];
                    
                    // Laatste cyclus check (laatste 16 seconden)
                    if (totalBreathTime <= 16) {
                        title.innerText = "Laatste ronde: " + phases[cyclePhase];
                    } else {
                        title.innerText = phases[cyclePhase];
                    }
                    
                    sub.innerText = msgs[cyclePhase];
                    circle.innerText = cycleStep;

                    if (cyclePhase === 0) { circle.style.transform = "scale(1.4)"; circle.style.background = "rgba(139, 198, 63, 0.15)"; }
                    if (cyclePhase === 2) { circle.style.transform = "scale(1.0)"; circle.style.background = "rgba(139, 198, 63, 0.02)"; }

                    if (cycleStep-- <= 1) {
                        cycleStep = 4;
                        cyclePhase = (cyclePhase + 1) % 4;
                    }
                }

                if (totalBreathTime-- <= 0) {
                    clearInterval(breathInterval);
                    // Positieve confirmatie aan het eind
                    title.innerText = "Volledig Hersteld";
                    sub.innerText = "Heel goed gedaan. Je zenuwstelsel is nu in balans en je herstel is optimaal gestart. Geniet van je dag!";
                    circle.innerText = "✓";
                    circle.style.transform = "scale(1.2)";
                    // Na 10 seconden terug naar startscherm
                    setTimeout(() => location.reload(), 10000);
                }
            }, 1000);
        }

        async function resetBin() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify({ "user": "", "program": "idle" })
            });
        }

        setInterval(checkInbox, 3000);
    </script>
</body>
</html>
