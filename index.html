<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>fit20 Recovery v4.0</title>
    <style>
        :root { --fit20-green: #8BC63F; --fit20-blue: #009DF4; --antraciet: #333333; --light-gray: #f0f0f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #FFF; color: var(--antraciet); font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        #vTag { position: absolute; bottom: 15px; left: 15px; font-size: 10px; color: #888; z-index: 1000; }
        .logo { position: fixed; bottom: 4vh; right: 4vw; width: 20vw; max-width: 220px; z-index: 1000; }
        .top-section { height: 10vh; width: 100%; padding: 20px; display: flex; justify-content: flex-start; }
        .middle-section { height: 75vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5vw; text-align: center; position: relative; }
        .bottom-section { height: 15vh; width: 100%; position: relative; display: flex; justify-content: center; align-items: flex-end; }
        
        #overallTimer { font-size: 3vw; font-weight: 700; color: #ddd; }
        .progress { position: absolute; bottom: 0; width: 100%; height: 12px; background: #eee; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }

        .instruction-title { font-size: 4vw; font-weight: 700; margin-bottom: 2vh; }
        .sub-text { font-size: 1.8vw; color: #666; line-height: 1.4; max-width: 900px; min-height: 3em; }

        /* TIMELINE v4.0 */
        #timelineArea { width: 100vw; height: 500px; position: relative; overflow: hidden; display: flex; align-items: center; }
        .timeline-track { position: absolute; height: 100%; left: 50%; width: 10000px; display: flex; align-items: center; transition: none; z-index: 5; }
        
        .road-base { position: absolute; height: 10px; background: #eee; left: 0; width: 100%; top: 60%; transform: translateY(-50%); border-radius: 5px; z-index: 1; }
        .road-progress { position: absolute; height: 10px; background: var(--fit20-green); left: 0; width: 0; top: 60%; transform: translateY(-50%); border-radius: 5px; z-index: 2; }
        
        .milestone { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translateX(-50%); top: 60%; z-index: 10; }
        .milestone-dot { width: 22px; height: 22px; background: #ddd; border-radius: 50%; border: 4px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transform: translateY(-50%); }
        .milestone.reached .milestone-dot { background: var(--fit20-green); }
        
        .milestone-label { font-size: 1.1vw; font-weight: bold; color: #bbb; white-space: nowrap; margin-top: 25px; transition: all 0.3s ease; }
        .milestone.active-pop .milestone-label { color: var(--fit20-blue); font-size: 2.2vw; transform: scale(1.1); }
        .milestone.reached:not(.active-pop) .milestone-label { color: var(--antraciet); }
        .milestone-count { font-size: 0.8vw; color: #ccc; margin-bottom: 25px; font-weight: bold; transform: translateY(-10px); }

        /* De Zwevende Marker */
        .current-marker { 
            position: absolute; left: 50%; top: 35%; width: 110px; height: 110px; 
            background: var(--fit20-blue); border-radius: 50%; transform: translate(-50%, -50%); z-index: 100; 
            border: 6px solid white; box-shadow: 0 10px 30px rgba(0,157,244,0.4); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .current-marker::after { content: ""; position: absolute; top: 100%; left: 50%; width: 4px; height: 120px; background: repeating-linear-gradient(to bottom, var(--fit20-blue), var(--fit20-blue) 5px, transparent 5px, transparent 10px); opacity: 0.4; transform: translateX(-50%); z-index: -1; }

        .marker-val { font-size: 3vw; font-weight: 900; line-height: 1; }
        .marker-label { font-size: 0.9vw; font-weight: bold; opacity: 0.9; }

        /* REVEAL EFFECT */
        .reveal-active .current-marker { width: 230px; height: 230px; top: 40%; }
        .reveal-active .current-marker::after { display: none; }
        .reveal-active .marker-val { font-size: 7vw; }
        .milestone-title-big { position: absolute; width: 100%; top: 80%; left: 0; font-size: 4.5vw; font-weight: 900; color: var(--fit20-blue); opacity: 0; transform: translateY(30px); transition: all 1s ease-out; text-align: center; z-index: 110; }
        .reveal-active .milestone-title-big { opacity: 1; transform: translateY(0); }

        .firework { position: absolute; width: 6px; height: 6px; border-radius: 50%; opacity: 0; pointer-events: none; }
        @keyframes explode { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)); opacity: 0; } }

        .hidden { display: none !important; }
        .visual-circle { width: 260px; height: 260px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; background: var(--light-gray); }
        .visual-circle::after { content: ""; width: 220px; height: 220px; background: white; border-radius: 50%; position: absolute; z-index: 1; }
        .circle-number { z-index: 10; font-size: 80px; font-weight: 800; color: var(--fit20-green); position: relative; }
    </style>
</head>
<body>
    <div id="vTag">v4.0</div>
    <div class="top-section"><div id="overallTimer" class="hidden"><span id="timeVal">--:--</span></div></div>

    <div class="middle-section" id="setupArea">
        <h1 id="userName" style="font-size: 6vw; margin-bottom: 2vh;">fit20 Recovery</h1>
        <p id="personalMsg" class="sub-text">Initialiseren...</p>
        <button id="startActionBtn" class="hidden" style="padding: 3vh 8vw; background: var(--fit20-green); color: white; border: none; border-radius: 20px; font-size: 3.5vw; font-weight: bold; cursor: pointer;">START</button>
    </div>

    <div class="middle-section hidden" id="actionArea">
        <div class="instruction-title" id="mainTitle"></div>
        <div id="mainSubContainer" class="sub-text"></div>
        
        <div id="timelineArea" class="hidden">
            <div class="timeline-track" id="timelineTrack">
                <div class="road-base"></div>
                <div class="road-progress" id="roadFill"></div>
            </div>
            <div class="current-marker" id="userMarker">
                <span id="markerNum" class="marker-val">0</span>
                <span id="markerLab" class="marker-label">Sessies</span>
            </div>
            <div id="bigMilestoneLabel" class="milestone-title-big">...</div>
            <div id="fireworkContainer"></div>
        </div>

        <div id="resultsArea" class="hidden">
            <div class="age-badge" id="ageDiffBadge"></div>
            <div class="meter-container" style="width:100%; height:44px; background:#eee; border-radius:22px; position:relative; margin:10vh 0 2vh 0; border:3px solid white;">
                <div style="position:absolute; top:-105px; left:0; display:flex; flex-direction:column; align-items:center;">
                    <span id="labelFit" style="font-size:1.2vw; color:#999; font-weight:bold;">fit20 Age</span><br>
                    <span id="dynamicAge" style="font-size:5.5vw; font-weight:900; color:var(--fit20-green); line-height:1;">0</span>
                </div>
                <div style="position:absolute; top:-105px; right:0; display:flex; flex-direction:column; align-items:center;">
                    <span id="labelCal" style="font-size:1.2vw; color:#999; font-weight:bold;">Kalender</span><br>
                    <span id="valCal" style="font-size:5.5vw; font-weight:900; color:var(--fit20-green); line-height:1;">0</span>
                </div>
                <div id="meterFill" style="height:100%; background:var(--fit20-green); border-radius:22px; position:absolute; top:0; right:0; width:0%; transition:width 8s linear;"></div>
            </div>
        </div>

        <div class="visual-circle" id="flowCircle"><div class="circle-number" id="flowCircleContent"></div></div>
        <div id="prepCountdown" class="hidden" style="font-size:15vw; font-weight:800; color:var(--fit20-green);"></div>
    </div>

    <div class="middle-section hidden" id="breathingArea">
        <div class="instruction-title" id="breathTitle"></div>
        <div style="display:flex; width:100%; align-items:center;">
            <div style="flex:2;"><img src="box-breathe-instructie.png" style="max-width:95%; max-height:48vh; border-radius:12px;"></div>
            <div style="flex:1;"><div class="visual-circle" id="breathCircle"><div class="circle-number" id="breathCircleContent">1</div></div></div>
        </div>
    </div>

    <div class="bottom-section"><img src="fit20-logo.png" class="logo"><div class="progress"><div id="bar"></div></div></div>

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        const CONTENT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?gid=0&single=true&output=csv';
        const LABELS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?gid=583309678&single=true&output=csv';
        const MILESTONES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?gid=1358156245&single=true&output=csv';

        let reservoir = [], labelsRaw = [], milestoneDataRaw = [], sessionData = { lang: 'nl' }, isSessionActive = false, currentLabels = {}, preSelectedTexts = {};

        function parseCSV(text) {
            return text.split(/\r?\n/).filter(l => l.trim() !== "").map(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return cols.map(c => c.replace(/^"|"$/g, '').trim().replace(/""/g, '"'));
            });
        }

        async function loadData() {
            const msg = document.getElementById('personalMsg');
            try {
                msg.innerText = "Laden content...";
                const resC = await fetch(CONTENT_URL+'&t='+Date.now());
                reservoir = parseCSV(await resC.text());

                msg.innerText = "Laden labels...";
                const resL = await fetch(LABELS_URL+'&t='+Date.now());
                labelsRaw = parseCSV(await resL.text());

                msg.innerText = "Laden mijlpalen...";
                const resM = await fetch(MILESTONES_URL+'&t='+Date.now());
                milestoneDataRaw = parseCSV(await resM.text());

                updateUILanguage();
            } catch (e) { msg.innerHTML = "<span style='color:red'>Laden mislukt. Check Sheet publicatie.</span>"; }
        }

        function updateUILanguage() {
            const langIdx = sessionData.lang === 'en' ? 2 : 1;
            labelsRaw.forEach(row => { if(row[0]) currentLabels[row[0]] = row[langIdx]; });
            if (document.getElementById('personalMsg')) document.getElementById('personalMsg').innerText = currentLabels.setup_msg || "Wachten op trainer...";
            if (document.getElementById('startActionBtn')) document.getElementById('startActionBtn').innerText = currentLabels.start_btn || "START";
            if (document.getElementById('markerLab')) document.getElementById('markerLab').innerText = sessionData.lang === 'en' ? "Sessions" : "Sessies";
            if (document.getElementById('labelFit')) document.getElementById('labelFit').innerText = "fit20 Age";
            if (document.getElementById('labelCal')) document.getElementById('labelCal').innerText = sessionData.lang === 'en' ? "Calendar" : "Kalender";
        }

        async function checkInbox() {
            if (isSessionActive || reservoir.length === 0) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${Date.now()}`, { headers: { 'X-Master-Key': MASTER_KEY } });
                const data = await res.json();
                if (data.record.user && data.record.program === 'recovery') {
                    sessionData = data.record;
                    updateUILanguage();
                    document.getElementById('userName').innerText = (sessionData.lang === 'en' ? "Hello " : "Hallo
