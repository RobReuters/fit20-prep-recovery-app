<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>fit20 Recovery v1.2</title>
    
    <style>
        :root { --fit20-green: #8BC63F; --antraciet: #333333; --light-gray: #f0f0f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #FFF; color: var(--antraciet); font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* Versie Tag */
        .version-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; color: #ccc; z-index: 1000; }

        .top-section { height: 10vh; width: 100%; padding: 20px; display: flex; justify-content: flex-start; }
        .middle-section { height: 65vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5vw; text-align: center; }
        .bottom-section { height: 25vh; width: 100%; position: relative; display: flex; justify-content: center; align-items: flex-end; }

        .logo { position: absolute; bottom: 30px; right: 30px; width: 25vw; max-width: 250px; }
        #overallTimer { font-size: 3vw; font-weight: 700; color: #ddd; }
        .progress { position: absolute; bottom: 0; width: 100%; height: 12px; background: #eee; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }

        .instruction-title { font-size: 4.5vw; font-weight: 700; margin-bottom: 2vh; color: var(--antraciet); }
        .sub-text { font-size: 2.2vw; color: #666; line-height: 1.5; max-width: 900px; min-height: 3em; margin-bottom: 2vh; }

        /* DASHBOARD RESULTATEN v1.2 */
        #resultsArea { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }
        
        /* De Badge (Verborgen bij start) */
        .age-badge { 
            background: var(--fit20-green); color: white; padding: 25px 60px; border-radius: 100px; 
            font-size: 5vw; font-weight: 800; margin-bottom: 40px; 
            box-shadow: 0 15px 35px rgba(139,198,63,0.4);
            opacity: 0; transform: translateY(20px); transition: all 1s ease-out;
        }
        .age-badge.show { opacity: 1; transform: translateY(0); }

        /* De prominente fit20 Age box */
        #fitAgeHighlight {
            font-size: 6vw; font-weight: 900; color: var(--fit20-green);
            opacity: 0; transition: opacity 1.5s ease-in;
        }
        #fitAgeHighlight.show { opacity: 1; }
        
        .meter-container { width: 100%; height: 60px; background: #eee; border-radius: 30px; position: relative; margin: 50px 0; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .meter-fill { height: 100%; background: var(--fit20-green); border-radius: 30px; position: absolute; right: 0; width: 0%; transition: width 5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .age-label { position: absolute; top: -45px; font-weight: bold; font-size: 2vw; }
        .label-left { left: 0; color: var(--fit20-green); }
        .label-right { right: 0; color: #bbb; }

        /* Overige */
        .visual-circle { width: 280px; height: 280px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; transition: transform 4s ease-in-out; background: var(--light-gray); }
        .visual-circle::after { content: ""; width: 230px; height: 230px; background: white; border-radius: 50%; position: absolute; z-index: 1; }
        .circle-number { z-index: 10; font-size: 90px; font-weight: 800; color: var(--fit20-green); position: relative; }
        #boxBreathingLayout { display: flex; width: 100%; height: 100%; align-items: center; }
        .layout-left { flex: 2; display: flex; justify-content: center; }
        .layout-right { flex: 1; display: flex; justify-content: center; }
        .instruction-image { max-width: 95%; max-height: 50vh; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        #prepCountdown { font-size: 18vw; font-weight: 800; color: var(--fit20-green); }
        #startActionBtn { padding: 4vh 8vw; background: var(--fit20-green); color: white; border: none; border-radius: 20px; font-size: 4vw; font-weight: bold; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="version-tag">v1.2</div>

    <div class="top-section">
        <div id="overallTimer" class="hidden"><span id="timeVal">--:--</span></div>
    </div>

    <div class="middle-section" id="setupArea">
        <h1 id="userName" style="font-size: 6vw; margin-bottom: 2vh;">fit20 Recovery</h1>
        <p class="sub-text" id="personalMsg">Wachten op activatie...</p>
        <button id="startActionBtn" class="hidden">START RECOVERY</button>
    </div>

    <div class="middle-section hidden" id="actionArea">
        <div class="instruction-title" id="mainTitle">...</div>
        <p class="sub-text" id="mainSubText">...</p>
        
        <div class="visual-circle" id="flowCircle">
            <div class="circle-number" id="flowCircleContent"></div>
        </div>

        <div id="resultsArea" class="hidden">
            <div class="age-badge" id="ageDiffBadge">- 0 JAAR</div>
            <div id="fitAgeHighlight">fit20 Age: <span id="valFitBig">0</span></div>
            <div class="meter-container">
                <div class="age-label label-left">Jouw Doel</div>
                <div class="age-label label-right">Kalenderleeftijd: <span id="valCal">0</span></div>
                <div class="meter-fill" id="meterFill"></div>
            </div>
        </div>

        <div id="prepCountdown" class="hidden">30</div>
    </div>

    <div class="middle-section hidden" id="breathingArea">
        <div class="instruction-title" id="breathTitle">Adem in</div>
        <div id="boxBreathingLayout">
            <div class="layout-left"><img src="box-breathe-instructie.png" class="instruction-image"></div>
            <div class="layout-right">
                <div class="visual-circle" id="breathCircle"><div class="circle-number" id="breathCircleContent">1</div></div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <img src="fit20-logo.png" class="logo">
        <div class="progress"><div id="bar"></div></div>
    </div>

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?gid=0&single=true&output=csv';

        let reservoir = [], sessionData = {}, selectedTexts = {}, isSessionActive = false, totalSeconds = 600, currentTimer = 600;

        async function loadReservoir() {
            try {
                let res = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
                let csvText = await res.text();
                const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
                reservoir = lines.slice(1).map(line => {
                    const c = line.includes(';') ? line.split(';') : line.split(',');
                    return { cat: c[0]?.trim().toLowerCase(), gender: c[1]?.trim().toLowerCase(), profile: c[2]?.trim().toLowerCase(), title: c[3]?.trim(), text: c[4]?.trim() };
                });
            } catch (e) {}
        }
        loadReservoir();

        async function checkInbox() {
            if (isSessionActive || reservoir.length === 0) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${Date.now()}`, { headers: { 'X-Master-Key': MASTER_KEY } });
                const data = await res.json();
                if (data.record.user && data.record.program === 'recovery') {
                    sessionData = data.record;
                    document.getElementById('userName').innerText = "Hallo " + sessionData.user;
                    document.getElementById('startActionBtn').classList.remove('hidden');
                    let t = 0;
                    if(sessionData.steps.includes('recovery')) t += 180;
                    if(sessionData.steps.includes('results')) t += 60;
                    if(sessionData.steps.includes('science')) t += 120;
                    if(sessionData.steps.includes('breathing')) t += 240;
                    if(sessionData.steps.includes('end')) t += 60;
                    totalSeconds = t; currentTimer = t;
                    selectedTexts = ["a","b","c","d","e","f","g","h","i","j"].reduce((acc, cat) => { acc[cat] = pickText(cat); return acc; }, {});
                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify({ "user": "", "program": "idle" }) });
                }
            } catch (e) {}
        }

        function pickText(cat) {
            const gender = sessionData.genders[0];
            const profiles = sessionData.profiles;
            const matches = reservoir.filter(t => t.cat === cat && (t.gender === "both" || gender === "both" || t.gender === gender) && (t.profile === "all" || profiles.includes(t.profile)));
            return matches.length > 0 ? matches[Math.floor(Math.random() * matches.length)] : reservoir.find(t => t.cat === cat);
        }

        document.getElementById('startActionBtn').addEventListener('click', function() {
            isSessionActive = true;
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('actionArea').classList.remove('hidden');
            document.getElementById('overallTimer').classList.remove('hidden');
            const timerInt = setInterval(() => {
                let m = Math.floor(currentTimer / 60), s = currentTimer % 60;
                document.getElementById('timeVal').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                document.getElementById('bar').style.width = `${((totalSeconds - currentTimer) / totalSeconds) * 100}%`;
                if (currentTimer-- <= 0) { clearInterval(timerInt); location.reload(); }
            }, 1000);
            runMasterFlow();
        });

        function runMasterFlow() {
            const title = document.getElementById('mainTitle'), sub = document.getElementById('mainSubText');
            const pie = document.getElementById('flowCircle'), results = document.getElementById('resultsArea'), prep = document.getElementById('prepCountdown');
            let start = Date.now();
            
            const masterInt = setInterval(() => {
                let elapsed = Date.now() - start;
                let activeSteps = sessionData.steps;
                let currentTime = 0;

                if (activeSteps.includes('recovery')) {
                    if (elapsed < (currentTime + 180) * 1000) {
                        pie.classList.remove('hidden'); results.classList.add('hidden');
                        let localMs = elapsed - (currentTime * 1000);
                        let idx = Math.floor(localMs / 30000);
                        updateCircleUI(selectedTexts[["a","b","c","d","e","f"][idx]], localMs % 30000);
                        return;
                    }
                    currentTime += 180;
                }

                if (activeSteps.includes('results')) {
                    if (elapsed < (currentTime + 60) * 1000) {
                        title.innerText = "Jouw Biologische Verjonging";
                        sub.innerText = `fit20 draait de tijd voor je terug. Door je training presteer je vandaag op een veel jonger niveau.`;
                        pie.classList.add('hidden');
                        results.classList.remove('hidden');
                        
                        document.getElementById('valCal').innerText = sessionData.calAge;
                        document.getElementById('valFitBig').innerText = sessionData.fitAge;
                        const diff = sessionData.calAge - sessionData.fitAge;
                        document.getElementById('ageDiffBadge').innerText = `VERJONGING: - ${diff} JAAR`;
                        
                        const perc = Math.min((diff / 40) * 100, 100);
                        
                        // Start animatie na korte pauze
                        setTimeout(() => {
                            document.getElementById('meterFill').style.width = perc + "%";
                            // Toon badge en fitAge pas na 5 seconden (als de balk klaar is)
                            setTimeout(() => {
                                document.getElementById('ageDiffBadge').classList.add('show');
                                document.getElementById('fitAgeHighlight').classList.add('show');
                            }, 5000);
                        }, 500);
                        return;
                    }
                    currentTime += 60;
                }

                if (activeSteps.includes('science')) {
                    if (elapsed < (currentTime + 120) * 1000) {
                        results.classList.add('hidden'); pie.classList.remove('hidden');
                        let localMs = elapsed - (currentTime * 1000);
                        let idx = Math.floor(localMs / 30000);
                        updateCircleUI(selectedTexts[["g","h","i","j"][idx]], localMs % 30000);
                        return;
                    }
                    currentTime += 120;
                }

                if (activeSteps.includes('breathing')) {
                    if (elapsed < (currentTime + 30) * 1000) {
                        title.innerText = "Breng je adem tot rust";
                        sub.innerText = "Bereid je voor op de Box Breathing.";
                        pie.classList.add('hidden'); prep.classList.remove('hidden');
                        prep.innerText = Math.ceil(((currentTime + 30) * 1000 - elapsed) / 1000);
                        return;
                    }
                    currentTime += 30;
                    if (elapsed < (currentTime + 210) * 1000) {
                        clearInterval(masterInt);
                        document.getElementById('actionArea').classList.add('hidden');
                        document.getElementById('breathingArea').classList.remove('hidden');
                        startBreathing();
                        return;
                    }
                    currentTime += 210;
                }

                if (activeSteps.includes('end')) {
                    prep.classList.add('hidden'); pie.classList.remove('hidden');
                    title.innerText = `Klaar voor de week, ${sessionData.user}!`;
                    sub.innerText = "Verlaat rustig de stoel. Geniet van je herstel.";
                    document.getElementById('flowCircleContent').innerText = "✓";
                    pie.style.background = "var(--light-gray)";
                }
            }, 50);

            function updateCircleUI(data, ms) {
                if(!data) return;
                title.innerText = data.title; sub.innerText = data.text;
                let deg = (ms / 30000) * 360;
                pie.style.background = ms < 100 ? "var(--light-gray)" : `conic-gradient(var(--fit20-green) ${deg}deg, var(--light-gray) ${deg}deg)`;
            }
        }

        function startBreathing() {
            const bTitle = document.getElementById('breathTitle'), bPie = document.getElementById('breathCircle'), bContent = document.getElementById('breathCircleContent');
            let step = 1, phase = 0, total = 210;
            const phases = ["Adem in", "Vast houden", "Adem uit", "Vast houden"];
            bPie.style.background = "var(--light-gray)"; 
            const bInt = setInterval(() => {
                bTitle.innerText = phases[phase];
                bContent.innerText = step;
                if (phase === 0) bPie.style.transform = "scale(1.4)";
                if (phase === 2) bPie.style.transform = "scale(0.8)";
                if (step++ >= 4) { step = 1; phase = (phase + 1) % 4; }
                if (total-- <= 0) { clearInterval(bInt); location.reload(); }
            }, 1000);
        }

        setInterval(checkInbox, 3000);
    </script>
</body>
</html>
