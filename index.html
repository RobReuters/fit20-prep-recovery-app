<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>fit20 Recovery</title>
    <style>
        :root {
            --fit20-green: #8BC63F;
            --antraciet: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: #FFFFFF; 
            color: var(--antraciet); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Logo ECHT in de hoek zonder witruimte */
        .logo { 
            position: absolute; 
            bottom: 2vh; 
            right: 2vw; 
            width: 30vw; /* Nu 2x zo groot als voorheen */
            max-width: 350px;
            z-index: 10;
        }

        .main-container {
            width: 95%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .welcome-text {
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.2vw;
            color: #999;
            font-size: 2vw;
            margin-bottom: 2vh;
        }

        .name { 
            font-size: 8vw; 
            font-weight: 700; 
            margin-bottom: 2vh;
            line-height: 1;
        }

        .message {
            font-size: 3vw;
            max-width: 800px;
            margin: 0 auto 5vh auto;
            line-height: 1.5;
            color: #555;
        }

        #timer { 
            font-size: 25vw; 
            font-weight: 800; 
            color: var(--fit20-green); 
            line-height: 0.9;
        }

        #startActionBtn {
            padding: 3vh 10vw;
            background: var(--fit20-green);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 4vw;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(139, 198, 63, 0.3);
        }

        .progress { position: absolute; bottom: 0; left: 0; width: 100%; height: 15px; background: #f0f0f0; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="main-container" id="setupArea">
        <p class="welcome-text">Welcome to the fit20 recovery program</p>
        <div class="name" id="userName">Systeem Gereed</div>
        <div class="message" id="personalMsg">Wachten op activatie door je trainer...</div>
        <button id="startActionBtn" class="hidden">START</button>
    </div>

    <div class="main-container hidden" id="timerArea">
        <p class="welcome-text">Recovery in progress</p>
        <div id="timer">10:00</div>
    </div>

    <div class="progress"><div id="bar"></div></div>
    
    <img src="fit20-logo.png?v=1" class="logo" alt="fit20">

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        
        let isSessionActive = false;

        async function checkInbox() {
            if (isSessionActive) return;

            try {
                // ?t=[timestamp] dwingt de browser elke 3 sec een verse check te doen (geen cache!)
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${new Date().getTime()}`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await res.json();
                
                if (data.record.user && data.record.program === 'recovery') {
                    prepareSession(data.record.user);
                    await resetBin();
                }
            } catch (e) { console.log("Polling..."); }
        }

        function prepareSession(name) {
            document.getElementById('userName').innerText = "Hallo " + name;
            document.getElementById('personalMsg').innerText = "Je hebt hard getraind vandaag. Goed gedaan! Ga rustig zitten en klik op 'Start'.";
            document.getElementById('startActionBtn').classList.remove('hidden');
        }

        document.getElementById('startActionBtn').addEventListener('click', function() {
            startTimer();
        });

        function startTimer() {
            isSessionActive = true;
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('timerArea').classList.remove('hidden');
            
            let time = 600;
            const timerEl = document.getElementById('timer');
            const barEl = document.getElementById('bar');
            
            const interval = setInterval(() => {
                let m = Math.floor(time / 60), s = time % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                barEl.style.width = `${((600 - time) / 600) * 100}%`;
                
                if (time-- <= 0) { 
                    clearInterval(interval); 
                    timerEl.innerText = "Klaar"; 
                    setTimeout(() => location.reload(), 10000);
                }
            }, 1000);
        }

        async function resetBin() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify({ "user": "", "program": "idle" })
            });
        }

        setInterval(checkInbox, 3000);
    </script>
</body>
</html>
