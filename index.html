<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Recovery Station</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            /* OFFICIËLE FIT20 KLEUREN */
            --fit20-green: #8BC63F; /* PRIMAIR */
            --fit20-blue: #00AEEF; /* STEUN */
            --fit20-magenta: #E6007E; /* STEUN */
            
            --fit20-dark-bg: #1A1A1B;
            --text-main: #FFFFFF;
            --text-sub: #AAAAAA;
        }

        body {
            background-color: var(--fit20-dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Subtiele groene gloed op de achtergrond */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(139, 198, 63, 0.08) 0%, transparent 70%);
            z-index: -1;
        }

        /* Logo Container */
        .logo-container {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
        }
        .logo-container img {
            max-width: 150px; /* Pas aan naar wens */
            height: auto;
        }

        #content {
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-size: 1.2rem;
            color: var(--text-sub);
        }

        .client-name {
            font-size: 4rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 25px;
        }

        #timer {
            font-size: 9rem;
            font-weight: 800;
            color: var(--fit20-green);
            text-shadow: 0 0 35px rgba(139, 198, 63, 0.3);
            /* Groene ademhalingsanimatie */
            animation: pulse-green 4s infinite ease-in-out;
        }

        @keyframes pulse-green {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.04); opacity: 0.85; }
        }

        .status-msg {
            margin-top: 50px;
            font-size: 1.1rem;
            color: #666;
            font-style: italic;
        }

        /* Progress bar onderaan */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: #2a2a2a;
        }
        #progress-bar {
            width: 0%; /* Start op 0% */
            height: 100%;
            background: var(--fit20-green);
            box-shadow: 0 0 10px rgba(139, 198, 63, 0.5);
            transition: width 1s linear;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="logo-container">
        <img src="fit20-logo.png" alt="fit20 Logo">
    </div>

    <div id="content">
        <h1>Welcome to fit20</h1>
        <div class="client-name">Recovery</div>
        <div id="timer">--:--</div>
        <div class="status-msg">Wachten op activatie door trainer...</div>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    </body>
</html>
