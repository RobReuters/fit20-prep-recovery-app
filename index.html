<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>fit20 Recovery v5.4</title>
    <style>
        :root { --fit20-green: #8BC63F; --fit20-blue: #009DF4; --antraciet: #333333; --light-gray: #f0f0f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #FFF; color: var(--antraciet); font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; align-items: center; transition: background 1s ease; }
        
        #vTag { position: absolute; bottom: 15px; left: 15px; font-size: 10px; color: #888; z-index: 1000; }
        .logo { position: fixed; bottom: 4vh; right: 4vw; width: 20vw; max-width: 220px; z-index: 1000; transition: opacity 1s; }
        .top-section { height: 10vh; width: 100%; padding: 20px; display: flex; justify-content: flex-start; }
        .middle-section { height: 75vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5vw; text-align: center; position: relative; }
        .bottom-section { height: 15vh; width: 100%; position: relative; display: flex; justify-content: center; align-items: flex-end; }
        
        #overallTimer { font-size: 3vw; font-weight: 700; color: #ddd; }
        .progress { position: absolute; bottom: 0; width: 100%; height: 12px; background: #eee; transition: opacity 1s; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }

        .instruction-title { font-size: 4vw; font-weight: 700; margin-bottom: 1vh; min-height: 1.2em; transition: font-size 0.5s; }
        .sub-text { font-size: 1.8vw; color: #666; line-height: 1.4; max-width: 900px; min-height: 3em; transition: font-size 0.5s; }

        /* JOURNEY & ANALOGY STYLING */
        #timelineArea { width: 100vw; height: 500px; position: relative; overflow: hidden; display: flex; align-items: center; }
        .timeline-track { position: absolute; height: 100%; left: 50%; width: 10000px; display: flex; align-items: center; transition: none; z-index: 5; }
        .road-base { position: absolute; height: 10px; background: #eee; left: 0; width: 100%; top: 60%; transform: translateY(-50%); border-radius: 5px; z-index: 1; }
        .road-progress { position: absolute; height: 10px; background: var(--fit20-green); left: 0; width: 0; top: 60%; transform: translateY(-50%); border-radius: 5px; z-index: 2; }
        .milestone { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translateX(-50%); top: 60%; z-index: 10; }
        .milestone-dot { width: 22px; height: 22px; background: #ddd; border-radius: 50%; border: 4px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transform: translateY(-50%); }
        .milestone.reached .milestone-dot { background: var(--fit20-green); }
        .current-marker { position: absolute; left: 50%; top: 35%; width: 110px; height: 110px; background: var(--fit20-blue); border-radius: 50%; transform: translate(-50%, -50%); z-index: 100; border: 6px solid white; box-shadow: 0 10px 30px rgba(0,157,244,0.4); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .current-marker::after { content: ""; position: absolute; top: 100%; left: 50%; width: 4px; height: 120px; background: repeating-linear-gradient(to bottom, var(--fit20-blue), var(--fit20-blue) 5px, transparent 5px, transparent 10px); opacity: 0.4; transform: translateX(-50%); z-index: -1; }
        .marker-val { font-size: 3vw; font-weight: 900; line-height: 1; }
        .marker-label { font-size: 0.9vw; font-weight: bold; opacity: 0.9; }
        .milestone-title-big { position: absolute; width: 100%; top: 82%; left: 0; font-size: 4.5vw; font-weight: 900; color: var(--fit20-blue); opacity: 0; transform: translateY(30px); transition: all 1s ease-out; text-align: center; z-index: 110; }
        .reveal-active .milestone-title-big { opacity: 1; transform: translateY(0); }
        .reveal-active .current-marker { width: 230px; height: 230px; top: 40%; }
        .reveal-active .current-marker::after { display: none; }
        .reveal-active .marker-val { font-size: 7vw; }

        .firework { position: absolute; width: 6px; height: 6px; border-radius: 50%; opacity: 0; pointer-events: none; }
        @keyframes explode { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)); opacity: 0; } }

        #analogyArea { width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center; }
        .weight-counter { font-size: 5.5vw; font-weight: 900; color: var(--fit20-blue); margin-bottom: 3vh; }
        .animal-display { display: flex; flex-direction: column; align-items: center; gap: 15px; min-height: 220px; margin-bottom: 2vh; }
        .animal-row { display: flex; align-items: center; background: #fdfdfd; border: 2px solid #eee; padding: 10px 30px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); opacity: 0; transform: scale(0.8); animation: popBadge 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animal-emoji { font-size: 3.5vw; margin-right: 20px; }
        .animal-text { font-size: 2.2vw; font-weight: 800; color: var(--antraciet); }
        @keyframes popBadge { to { opacity: 1; transform: scale(1); } }
        
        .distance-reveal { font-size: 2vw; font-weight: 700; color: var(--antraciet); margin-top: 2vh; opacity: 0; transition: opacity 1s; padding: 15px 30px; background: #f0f8ff; border-radius: 20px; border: 2px solid var(--fit20-blue); text-align: center; line-height: 1.4; }
        .distance-reveal.show { opacity: 1; transform: translateY(-5px); }

        /* RESULTS STYLING */
        #resultsArea { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }
        .age-badge { background: var(--fit20-blue); color: white; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; clip-path: polygon(100% 50%, 94% 63%, 94% 77%, 82% 82%, 77% 94%, 63% 94%, 50% 100%, 37% 94%, 23% 94%, 18% 82%, 6% 77%, 6% 63%, 0% 50%, 6% 37%, 6% 23%, 18% 18%, 23% 6%, 37% 6%, 50% 0%, 63% 6%, 77% 6%, 82% 18%, 94% 23%, 94% 37%); font-size: 1.8vw; font-weight: 800; padding: 45px; text-align: center; opacity: 0; transform: scale(0.5) rotate(-15deg); transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex-shrink: 0; }
        .age-badge.show { opacity: 1; transform: scale(1) rotate(0deg); }

        /* BREATHING CONTROLS (Groot & Links Uitgelijnd) */
        .breath-controls { margin-top: 5vh; display: flex; gap: 20px; z-index: 1000; transition: opacity 0.5s; width: 100%; justify-content: flex-start; padding-left: 10vw; }
        .breath-btn { padding: 18px 45px; border-radius: 50px; border: 3px solid var(--fit20-blue); background: white; color: var(--fit20-blue); font-weight: 800; font-size: 1.8vw; cursor: pointer; transition: all 0.3s; }
        .breath-btn.active { background: var(--fit20-blue); color: white; }
        .breath-btn.stop { border-color: #999; color: #999; }
        .breath-btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: #ccc; color: #ccc; }
        .btn-hidden { display: none !important; }
        .hidden { display: none !important; }
        
        #breathingVisuals { display:flex; width:100%; align-items:center; justify-content: center; gap: 5vw; transition: opacity 0.5s, transform 0.5s; }
        #breathingVisuals.fade-out { opacity: 0; transform: translateY(20px); pointer-events: none; }
        
        /* Cirkel - Flex-shrink 0 toegevoegd om platdrukken te voorkomen */
        .visual-circle { width: 280px; height: 280px; min-width: 280px; min-height: 280px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; background: var(--light-gray); transition: transform var(--circle-speed, 4s) linear; flex-shrink: 0; }
        .visual-circle::after { content: ""; width: 230px; height: 230px; background: white; border-radius: 50%; position: absolute; z-index: 1; flex-shrink: 0; }
        .circle-number { z-index: 10; font-size: 90px; font-weight: 800; color: var(--fit20-green); position: relative; }
        
        .relaxed-text-active #breathTitle { font-size: 6vw; margin-bottom: 2vh; color: var(--fit20-blue); }
        .relaxed-text-active #breathSub { font-size: 2.5vw; color: #555; }
    </style>
</head>
<body>
    <div id="vTag">v5.4</div>
    <div class="top-section"><div id="overallTimer" class="hidden"><span id="timeVal">--:--</span></div></div>

    <div class="middle-section" id="setupArea">
        <h1 id="userName" style="font-size: 6vw; margin-bottom: 2vh;">fit20 Recovery</h1>
        <p id="personalMsg" class="sub-text">Initialiseren...</p>
        <button id="startActionBtn" class="hidden" style="padding: 3vh 8vw; background: var(--fit20-green); color: white; border: none; border-radius: 20px; font-size: 3.5vw; font-weight: bold; cursor: pointer;">START</button>
    </div>

    <div class="middle-section hidden" id="actionArea">
        <div class="instruction-title" id="mainTitle"></div>
        <div id="mainSubContainer" class="sub-text"></div>
        
        <div id="timelineArea" class="hidden">
            <div class="timeline-track" id="timelineTrack"><div class="road-base"></div><div class="road-progress" id="roadFill"></div></div>
            <div class="current-marker" id="userMarker"><span id="markerNum" class="marker-val">0</span><span id="markerLab" class="marker-label">Sessies</span></div>
            <div id="bigMilestoneLabel" class="milestone-title-big">...</div>
            <div id="fireworkContainer"></div>
        </div>

        <div id="analogyArea" class="hidden">
            <div class="weight-counter" id="weightVal">0 kg</div>
            <div class="animal-display" id="animalDisplay"></div>
            <div class="distance-reveal" id="distReveal"></div>
        </div>

        <div id="resultsArea" class="hidden">
            <div class="meter-container" style="width:100%; height:44px; background:#eee; border-radius:22px; position:relative; margin:10vh 0 2vh 0; border:3px solid white;">
                <div style="position:absolute; top:-105px; left:0; display:flex; flex-direction:column; align-items:center;">
                    <span id="labelFit" style="font-size:1.2vw; color:#999; font-weight:bold;">fit20 Age</span><br>
                    <span id="dynamicAge" style="font-size:5.5vw; font-weight:900; color:var(--fit20-green); line-height:1;">0</span>
                </div>
                <div style="position:absolute; top:-105px; right:0; display:flex; flex-direction:column; align-items:center;">
                    <span id="labelCal" style="font-size:1.2vw; color:#999; font-weight:bold;">Kalender</span><br>
                    <span id="valCal" style="font-size:5.5vw; font-weight:900; color:var(--fit20-green); line-height:1;">0</span>
                </div>
                <div id="meterFill" style="height:100%; background:var(--fit20-green); border-radius:22px; position:absolute; top:0; right:0; width:0%; transition:width 8s linear;"></div>
            </div>
            <div id="ageDiffBadge" class="age-badge"></div>
        </div>

        <div class="visual-circle" id="flowCircle"><div class="circle-number" id="flowCircleContent"></div></div>
        <div id="prepCountdown" class="hidden" style="font-size:15vw; font-weight:800; color:var(--fit20-green);"></div>
    </div>

    <div class="middle-section hidden" id="breathingArea">
        <div class="instruction-title" id="breathTitle">Adem in (neus)</div>
        <div id="breathSub" class="sub-text" style="margin-bottom: 2vh;">Houd het ritme vast</div>
        
        <div id="breathingVisuals">
            <div id="breathInstructImg"><img src="" style="max-width:95%; max-height:45vh; border-radius:12px;"></div>
            <div><div class="visual-circle" id="breathCircle"><div class="circle-number" id="breathCircleContent">1</div></div></div>
        </div>
        
        <div class="breath-controls">
            <button class="breath-btn active" id="btn44">4 - 4 - 4 - 4</button>
            <button class="breath-btn" id="btn33">3 - 3 - 3 - 3</button>
            <button class="breath-btn stop" id="btnStop">Vrij ademen</button>
        </div>
    </div>

    <div class="bottom-section"><img src="fit20-logo.png" class="logo"><div class="progress" id="progressContainer"><div id="bar"></div></div></div>

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?single=true&output=csv&gid=';
        
        const GIDS = { 
            content: '0', 
            labels: '583309678', 
            milestones: '1358156245', 
            settings: '1984964656', 
            animals: '1494954267', 
            distance: '1614390821' 
        };

        const audioPrep = new Audio('4-1.mp3');
        const audioBox = new Audio('4-2.mp3');
        audioPrep.loop = true; audioBox.loop = true;

        let reservoir = [], labelsRaw = [], milestoneDataRaw = [], analogySettings = [], animalSets = [], distanceMetaphors = [];
        let sessionData = { lang: 'nl', showFitAge: true };
        let isSessionActive = false, currentLabels = {}, preSelectedTexts = {};
        
        let currentBreathSize = 4;
        let breathingInterval = null;
        let isRelaxedMode = false;

        function parseCSV(text) {
            if(!text || text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html')) return [];
            return text.split(/\r?\n/).filter(l => l.trim() !== "").map(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return cols.map(c => c.replace(/^"|"$/g, '').trim().replace(/""/g, '"'));
            });
        }

        async function loadData() {
            const msg = document.getElementById('personalMsg');
            try {
                const results = await Promise.all(Object.values(GIDS).map(gid => fetch(BASE_URL + gid + '&t=' + Date.now()).then(r => r.text())));
                reservoir = parseCSV(results[0]); labelsRaw = parseCSV(results[1]); milestoneDataRaw = parseCSV(results[2]);
                analogySettings = parseCSV(results[3]); animalSets = parseCSV(results[4]); distanceMetaphors = parseCSV(results[5]);
                
                if (distanceMetaphors.length === 0) {
                    distanceMetaphors = [["both", "een Olympisch zwembad", "an Olympic pool", "50", "de lengte van", "the length of"]];
                }
                updateUILanguage();
            } catch (e) { 
                console.error(e);
                if(msg) msg.innerHTML = "<span style='color:red'>Laden mislukt. Check de Google Sheet URL's.</span>"; 
            }
        }

        function updateUILanguage() {
            const langIdx = sessionData.lang === 'en' ? 2 : 1;
            labelsRaw.forEach(row => { if(row && row[0]) currentLabels[row[0]] = row[langIdx]; });
            
            const setTxt = (id, key, def) => { 
                const el = document.getElementById(id); 
                if(el) el.innerText = currentLabels[key] || def; 
            };

            setTxt('personalMsg', 'setup_msg', "Systeem gereed...");
            setTxt('startActionBtn', 'start_btn', "START");
            setTxt('markerLab', 'sessions_label', sessionData.lang === 'en' ? "Sessions" : "Sessies");
            setTxt('labelFit', 'fit_age_label', "fit20 Age");
            setTxt('labelCal', 'calendar_label', sessionData.lang === 'en' ? "Calendar" : "Kalender");
            setTxt('btnStop', 'btn_free_breathe', "Vrij ademen");
        }

        function updateBreathImage() {
            const imgEl = document.querySelector('#breathInstructImg img');
            if(imgEl && !isRelaxedMode) {
                imgEl.src = `box-${currentBreathSize}-${sessionData.lang}.png`;
            }
        }

        async function checkInbox() {
            if (isSessionActive || reservoir.length === 0) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${Date.now()}`, { headers: { 'X-Master-Key': MASTER_KEY } });
                const data = await res.json();
                if (data.record.user && data.record.program === 'recovery') {
                    sessionData = data.record;
                    if(typeof sessionData.showFitAge === 'undefined') sessionData.showFitAge = true;
                    
                    updateUILanguage();
                    const userEl = document.getElementById('userName');
                    if(userEl) userEl.innerText = (sessionData.lang === 'en' ? "Hello " : "Hallo ") + sessionData.user;
                    
                    const msgEl = document.getElementById('personalMsg');
                    if(msgEl) msgEl.innerText = currentLabels.ready_msg || (sessionData.lang === 'en' ? "Ready to start?" : "Klaar voor de start?");
                    
                    const btn = document.getElementById('startActionBtn');
                    if(btn) btn.classList.remove('hidden');
                    
                    ["a","b","c","d","e","f","g","h","i","j"].forEach(cat => preSelectedTexts[cat] = pickStaticText(cat));
                    
                    updateBreathImage();

                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify({ "user": "", "program": "idle" }) });
                }
            } catch (e) {}
        }

        function pickStaticText(cat) {
            const langIdx = sessionData.lang === 'en' ? [5, 6] : [3, 4];
            const matches = reservoir.filter(t => t[0] === cat && (t[1] === "both" || t[1] === sessionData.genders[0]) && (t[2] === "all" || sessionData.profiles.includes(t[2])));
            const pick = matches.length > 0 ? matches[Math.floor(Math.random() * matches.length)] : reservoir.find(t => t[0] === cat);
            return pick ? { title: pick[langIdx[0]], text: pick[langIdx[1]] } : { title: "", text: "" };
        }

        document.getElementById('startActionBtn').addEventListener('click', () => {
            isSessionActive = true;
            audioPrep.play().then(() => audioPrep.pause());
            audioBox.play().then(() => audioBox.pause());
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('actionArea').classList.remove('hidden');
            document.getElementById('overallTimer').classList.remove('hidden');
            document.getElementById('vTag').style.display = 'none';
            runMasterFlow();
        });

        // --- INTERACTIE KNOPPEN ---
        document.getElementById('btn44').onclick = () => {};
        document.getElementById('btn33').onclick = () => {
            isRelaxedMode = false; currentBreathSize = 3;
            document.getElementById('btn44').classList.add('btn-hidden');
            document.getElementById('breathCircle').style.setProperty('--circle-speed', '3s');
            updateBreathUI('btn33'); updateBreathImage();
            audioBox.pause(); audioPrep.play();
        };

        document.getElementById('btnStop').onclick = () => {
            isRelaxedMode = true;
            document.getElementById('btn44').classList.add('btn-hidden');
            document.getElementById('btn33').disabled = true;
            updateBreathUI('btnStop');
            audioBox.pause(); audioPrep.play();
        };

        function updateBreathUI(activeId) {
            document.querySelectorAll('.breath-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(activeId).classList.add('active');
            if (isRelaxedMode) {
                document.getElementById('breathingVisuals').classList.add('fade-out');
                document.getElementById('breathingArea').classList.add('relaxed-text-active');
            }
        }

        function runMasterFlow() {
            const title = document.getElementById('mainTitle'), sub = document.getElementById('mainSubContainer');
            const pie = document.getElementById('flowCircle'), analogy = document.getElementById('analogyArea'), results = document.getElementById('resultsArea'), timeline = document.getElementById('timelineArea');
            let start = Date.now(), activeSteps = sessionData.steps;
            let totalTime = (activeSteps.includes('recovery') ? 180 : 0) + (activeSteps.includes('results') ? 60 : 0) + (activeSteps.includes('science') ? 120 : 0) + (activeSteps.includes('breathing') ? 240 : 0);
            let currentTimer = totalTime;

            let showFitAge = sessionData.showFitAge !== false;
            let phase1Time = showFitAge ? 20000 : 30000;
            let phase2Time = showFitAge ? 40000 : 60000;

            const tInt = setInterval(() => {
                let m = Math.floor(currentTimer / 60), s = currentTimer % 60;
                const timeVal = document.getElementById('timeVal');
                if(timeVal) timeVal.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                const bar = document.getElementById('bar');
                if(bar) bar.style.width = `${((totalTime - currentTimer) / totalTime) * 100}%`;
                if (currentTimer-- <= 0) clearInterval(tInt);
            }, 1000);

            const masterInt = setInterval(() => {
                let elapsed = Date.now() - start, stepStart = 0;
                
                // 1. RECOVERY
                if (activeSteps.includes('recovery')) {
                    if (elapsed < 180000) {
                        const cat = ["a","b","c","d","e","f"][Math.floor(elapsed / 30000)];
                        title.innerText = preSelectedTexts[cat].title; sub.innerText = preSelectedTexts[cat].text;
                        pie.style.background = `conic-gradient(var(--fit20-green) ${(elapsed % 30000 / 30000) * 360}deg, var(--light-gray) 0deg)`;
                        return;
                    }
                    stepStart += 180;
                }

                // 2. RESULTS
                if (activeSteps.includes('results')) {
                    let resElapsed = elapsed - (stepStart * 1000);
                    if (resElapsed < 60000) {
                        pie.classList.add('hidden');
                        
                        if (resElapsed < phase1Time) {
                            title.innerText = sessionData.lang === 'en' ? "Your fit20 Journey" : "Jouw fit20 Reis";
                            sub.innerText = sessionData.lang === 'en' ? "Consistency is the foundation of strength." : "Consistentie is het fundament van kracht.";
                            timeline.classList.remove('hidden');
                            if (!timeline.dataset.started) { startAdaptiveJourney(parseInt(sessionData.totalSessions || 0)); timeline.dataset.started = "true"; }
                        
                        } else if (resElapsed < phase2Time) {
                            timeline.classList.add('hidden');
                            analogy.classList.remove('hidden');
                            title.innerText = sessionData.lang === 'en' ? "Total Volume Moved" : "Totaal Verplaatst Volume";
                            sub.innerText = sessionData.lang === 'en' ? "Every training adds up to incredible power." : "Elke training telt op tot ongelofelijke kracht.";
                            if (!analogy.dataset.started) { startAnalogy(parseInt(sessionData.totalSessions || 0)); analogy.dataset.started = "true"; }
                        
                        } else if (showFitAge) {
                            analogy.classList.add('hidden'); 
                            results.classList.remove('hidden');
                            title.innerText = currentLabels.results_title || "Resultaten"; 
                            sub.innerText = currentLabels.results_sub || "";
                            
                            if (document.getElementById('meterFill') && !results.dataset.started) {
                                results.dataset.started = "true";
                                
                                let cal = parseInt(sessionData.calAge);
                                let fit = parseInt(sessionData.fitAge);
                                let meterContainer = document.querySelector('.meter-container');
                                let badge = document.getElementById('ageDiffBadge');

                                document.getElementById('valCal').innerText = cal;
                                
                                // FIX F: Als verschil minder dan 1 jaar is (of negatief)
                                if (cal - fit < 1) {
                                    meterContainer.classList.add('hidden');
                                    badge.style.clipPath = "none";
                                    badge.style.borderRadius = "30px";
                                    badge.style.width = "80%";
                                    badge.style.height = "auto";
                                    badge.style.padding = "4vw";
                                    badge.style.fontSize = "3vw";
                                    badge.style.transform = "scale(0.5)"; 
                                    badge.innerText = currentLabels.age_equal_msg || "Je traint nu al op het niveau van iemand van jouw leeftijd!";
                                    
                                    setTimeout(() => { badge.style.transform = "scale(1)"; badge.style.opacity = "1"; }, 100);
                                } else {
                                    meterContainer.classList.remove('hidden');
                                    setTimeout(() => { 
                                        const fill = document.getElementById('meterFill');
                                        if(fill) fill.style.width = "100%"; 
                                        animateAgeCount(cal, fit); 
                                    }, 100);
                                }
                            }
                        }
                        return;
                    }
                    stepStart += 60;
                }
                
                // 3. SCIENCE
                if (activeSteps.includes('science')) {
                    let sciElapsed = elapsed - (stepStart * 1000);
                    if (sciElapsed < 120000) {
                        results.classList.add('hidden'); pie.classList.remove('hidden'); analogy.classList.add('hidden'); timeline.classList.add('hidden');
                        const cat = ["g","h","i","j"][Math.floor(sciElapsed / 30000)];
                        title.innerText = preSelectedTexts[cat].title; sub.innerText = preSelectedTexts[cat].text;
                        pie.style.background = `conic-gradient(var(--fit20-green) ${(sciElapsed % 30000 / 30000) * 360}deg, var(--light-gray) 0deg)`;
                        return;
                    }
                    stepStart += 120;
                }
                
                // 4. BREATHING
                if (activeSteps.includes('breathing')) {
                    let breathElapsed = elapsed - (stepStart * 1000);
                    if (breathElapsed < 30000) {
                        title.innerText = currentLabels.prep_title || "Bereid je voor..."; 
                        sub.innerText = currentLabels.prep_sub || "Ontspan je schouders.";
                        pie.classList.add('hidden'); 
                        const prep = document.getElementById('prepCountdown');
                        if (prep) {
                            prep.classList.remove('hidden');
                            prep.innerText = Math.ceil((30000 - breathElapsed) / 1000);
                        }
                        if (audioPrep.paused) audioPrep.play();
                        return;
                    } else {
                        clearInterval(masterInt);
                        document.getElementById('actionArea').classList.add('hidden');
                        document.getElementById('breathingArea').classList.remove('hidden');
                        startBreathing(); return;
                    }
                }
                
                if (activeSteps.includes('end')) { clearInterval(masterInt); showFinal(); } else { location.reload(); }
            }, 500);
        }

        // --- ONDERDELEN LOGICA (Journey & Analogy) ---
        function startAdaptiveJourney(total) {
            const track = document.getElementById('timelineTrack'), markerNum = document.getElementById('markerNum'), langIdx = sessionData.lang === 'en' ? 2 : 1;
            const spacing = 350;
            
            const j1_max = parseInt(currentLabels.j1_max || 29), j2_max = parseInt(currentLabels.j2_max || 69), j3_max = parseInt(currentLabels.j3_max || 149);
            let journeyCol = 3;
            if (total > j3_max) journeyCol = 6; else if (total > j2_max) journeyCol = 5; else if (total > j1_max) journeyCol = 4;

            // FIX D: Filter headers weg en forceer start bij 0
            let activeMilestones = milestoneDataRaw.filter(ms => ms[journeyCol] && ms[journeyCol].toLowerCase() === 'x' && !isNaN(parseInt(ms[0])));
            if (activeMilestones.length === 0 || parseInt(activeMilestones[0][0]) !== 0) {
                activeMilestones.unshift(["0", currentLabels.start_label || "Start", currentLabels.start_label || "Start", "x", "x", "x", "x"]);
            }

            let lastMilestoneName = "", triggeredIdx = -1;

            track.innerHTML = '<div class="road-base"></div><div class="road-progress" id="roadFill"></div>';
            activeMilestones.forEach((ms, index) => {
                let div = document.createElement('div'); div.className = "milestone"; div.id = "ms-" + index; div.style.left = (index * spacing) + "px";
                div.innerHTML = `<div class="milestone-count">${ms[0]}</div><div class="milestone-dot"></div><div class="milestone-label">${ms[langIdx]}</div>`;
                track.appendChild(div);
                if (total >= parseInt(ms[0])) lastMilestoneName = ms[langIdx];
            });

            let startTime = Date.now();
            const anim = setInterval(() => {
                let progress = Math.min((Date.now() - startTime) / 14000, 1);
                let currentVal = Math.round(progress * total);
                if(markerNum) markerNum.innerText = currentVal;

                let currentPos = 0;
                activeMilestones.forEach((ms, index) => {
                    if (currentVal >= parseInt(ms[0])) {
                        const el = document.getElementById("ms-"+index); if(el) el.classList.add('reached');
                        if (index > triggeredIdx) { if(el) el.classList.add('active-pop'); setTimeout(() => {if(el)el.classList.remove('active-pop')}, 800); triggeredIdx = index; }
                        currentPos = index * spacing;
                        if (index < activeMilestones.length - 1) {
                            let nextSess = parseInt(activeMilestones[index+1][0]), prevSess = parseInt(ms[0]);
                            currentPos += ((currentVal - prevSess) / (nextSess - prevSess)) * spacing;
                        }
                    }
                });
                track.style.transform = `translateX(-${currentPos}px)`;
                const fill = document.getElementById('roadFill');
                if(fill) fill.style.width = currentPos + "px";

                if (progress >= 1) { clearInterval(anim); triggerCelebration(lastMilestoneName); }
            }, 30);
        }

        function triggerCelebration(name) {
            const actionArea = document.getElementById('actionArea');
            if(actionArea) actionArea.classList.add('reveal-active');
            const bigLab = document.getElementById('bigMilestoneLabel');
            if(bigLab) bigLab.innerText = name;
            const container = document.getElementById('fireworkContainer');
            if(!container) return;
            for(let i=0; i<40; i++) {
                const p = document.createElement('div'); p.className = 'firework';
                p.style.background = i % 2 === 0 ? 'var(--fit20-green)' : 'var(--fit20-blue)';
                p.style.left = '50%'; p.style.top = '40%';
                const tx = (Math.random() - 0.5) * 800, ty = (Math.random() - 0.5) * 800;
                p.style.setProperty('--tx', tx + 'px'); p.style.setProperty('--ty', ty + 'px');
                p.style.animation = `explode ${1.5 + Math.random()}s forwards`;
                container.appendChild(p);
            }
        }

        function startAnalogy(sessions) {
            const gender = sessionData.genders[0];
            const weightSetting = analogySettings.find(s => s[0] === 'avg_weight_per_session' && s[1] === gender);
            const distSetting = analogySettings.find(s => s[0] === 'avg_dist_per_session' && s[1] === gender);
            const weightPerSession = weightSetting ? parseFloat(weightSetting[2]) : (gender === 'v' ? 252.5 : 312.5);
            const distPerSession = distSetting ? parseFloat(distSetting[2]) : 30;
            
            const totalKg = Math.round(sessions * weightPerSession);
            const totalMeters = Math.round(sessions * distPerSession);

            const set = animalSets.filter(a => a[0] === gender);
            const l_kg = parseInt((set.find(a => a[1] === 'large') || [])[4] || 5000);
            const m_kg = parseInt((set.find(a => a[1] === 'mid') || [])[4] || 300);
            const s_kg = parseInt((set.find(a => a[1] === 'small') || [])[4] || 50);
            
            let rem = totalKg;
            const l_count = Math.floor(rem / l_kg); rem %= l_kg;
            const m_count = Math.floor(rem / m_kg); rem %= m_kg;
            const s_count = Math.floor(rem / s_kg);

            let curKg = 0;
            const weightValEl = document.getElementById('weightVal');
            const kgInt = setInterval(() => {
                curKg += totalKg / 40;
                if(weightValEl) weightValEl.innerText = Math.round(curKg).toLocaleString(sessionData.lang === 'en' ? 'en-US' : 'nl-NL') + " kg";
                if (curKg >= totalKg) { 
                    clearInterval(kgInt); 
                    if(weightValEl) weightValEl.innerText = totalKg.toLocaleString(sessionData.lang === 'en' ? 'en-US' : 'nl-NL') + " kg"; 
                }
            }, 40);

            const display = document.getElementById('animalDisplay');
            if(display) display.innerHTML = "";
            const nameIdx = sessionData.lang === 'en' ? 3 : 2; 

            const addAnimalRow = (count, animalData, delayIndex) => {
                if (count <= 0 || !animalData) return; 
                setTimeout(() => {
                    let row = document.createElement('div');
                    row.className = 'animal-row';
                    row.innerHTML = `<span class="animal-emoji">${animalData[5]}</span><span class="animal-text">${count}x ${animalData[nameIdx]}</span>`;
                    if(display) display.appendChild(row);
                }, delayIndex * 500); 
            };

            let delayIdx = 0;
            if (l_count > 0) addAnimalRow(l_count, set.find(a => a[1] === 'large'), delayIdx++);
            if (m_count > 0) addAnimalRow(m_count, set.find(a => a[1] === 'mid'), delayIdx++);
            if (s_count > 0 || (l_count === 0 && m_count === 0)) addAnimalRow(s_count, set.find(a => a[1] === 'small'), delayIdx++);

            // FIX E: Voorkom header text bug bij zeer lage afstand
            const validMetas = distanceMetaphors.filter(m => !isNaN(parseInt(m[3])) && parseInt(m[3]) > 0);
            let meta = validMetas
                .filter(m => m[0] === gender || m[0] === 'both')
                .filter(m => parseInt(m[3]) <= totalMeters)
                .sort((a,b) => b[3] - a[3])[0];
            
            // Fallback naar de kleinste als er nog niks bereikt is
            if(!meta) meta = validMetas.filter(m => m[0] === gender || m[0] === 'both').sort((a,b) => a[3] - b[3])[0];
            
            if(meta) {
                const metaDist = parseInt(meta[3]);
                let mult = totalMeters / metaDist;
                let multStrEN = "", multStrNL = "";
                
                if (mult >= 1.1) {
                    let fmtEN = mult.toFixed(1).replace('.0', '');
                    let fmtNL = fmtEN.replace('.', ',');
                    multStrEN = fmtEN + "x ";
                    multStrNL = fmtNL + "x ";
                }
                
                setTimeout(() => {
                    const reveal = document.getElementById('distReveal');
                    if(reveal) {
                        const distTxt = sessionData.lang === 'en' ? 
                            `Moving under heavy load for a total distance of ${totalMeters.toLocaleString('en-US')}m...\nThat equals ${multStrEN}${meta[5]} ${meta[2]}!` : 
                            `En dat over een afstand van ${totalMeters.toLocaleString('nl-NL')}m onder zware weerstand...\nDat is gelijk aan ${multStrNL}${meta[4]} ${meta[1]}!`;
                        reveal.innerText = distTxt;
                        reveal.classList.add('show');
                    }
                }, 3000);
            }
        }

        function animateAgeCount(s, e) {
            let cur = s;
            const int = setInterval(() => {
                cur -= (s-e)/100; 
                const dyn = document.getElementById('dynamicAge');
                if(dyn) dyn.innerText = Math.round(cur);
                if(cur <= e) { 
                    clearInterval(int); if(dyn) dyn.innerText = e;
                    const badge = document.getElementById('ageDiffBadge');
                    if(badge) {
                        badge.innerText = (currentLabels.badge_text || "").replace('{diff}', (s-e));
                        badge.classList.add('show');
                    }
                }
            }, 80);
        }

        function startBreathing() {
            const bTitle = document.getElementById('breathTitle'), bSub = document.getElementById('breathSub'), bPie = document.getElementById('breathCircle'), bContent = document.getElementById('breathCircleContent');
            let step = 1, phase = 0, total = 210;
            const phases = sessionData.lang === 'en' ? ["Inhale (nose)", "Hold", "Exhale (mouth)", "Hold"] : ["Adem in (neus)", "Vast houden", "Adem uit (mond)", "Vast houden"];
            
            audioPrep.pause();
            setTimeout(() => { if(!isRelaxedMode && currentBreathSize === 4) { audioBox.currentTime = 0; audioBox.play(); } else { audioPrep.play(); } }, 600);

            bPie.style.setProperty('--circle-speed', `${currentBreathSize}s`);

            breathingInterval = setInterval(() => {
                if (isRelaxedMode) {
                    bTitle.innerText = currentLabels.relaxed_breath_title || "Adem rustig door";
                    bSub.innerText = currentLabels.relaxed_breath_sub || "In je eigen tempo";
                } else {
                    bTitle.innerText = phases[phase];
                    bSub.innerText = sessionData.lang === 'en' ? "Follow the rhythm" : "Houd het ritme vast";
                }
                
                bContent.innerText = step;
                if (phase === 0) bPie.style.transform = "scale(1.3)";
                if (phase === 2) bPie.style.transform = "scale(0.8)";
                
                if (step++ >= currentBreathSize) { step = 1; phase = (phase + 1) % 4; }
                if (total-- <= 0) { clearInterval(breathingInterval); audioBox.pause(); audioPrep.pause(); showFinal(); }
            }, 1000);
        }

        function showFinal() {
            document.getElementById('breathingArea').classList.add('hidden');
            const area = document.getElementById('actionArea');
            if(area) { area.classList.remove('hidden'); area.classList.remove('reveal-active'); }
            document.getElementById('timelineArea').classList.add('hidden');
            document.getElementById('resultsArea').classList.add('hidden');
            document.getElementById('analogyArea').classList.add('hidden');
            
            document.getElementById('mainTitle').innerText = (currentLabels.end_title || "Bedankt").replace('{user}', sessionData.user);
            document.getElementById('mainSubContainer').innerText = currentLabels.end_sub || "Tot volgende week!";
            
            // FIX C: Eindscherm platte cirkel gerepareerd
            const p = document.getElementById('flowCircle'); 
            const fc = document.getElementById('flowCircleContent');
            if(p) { 
                p.classList.remove('hidden'); 
                p.className = "visual-circle"; 
                p.style.transform = "none"; 
                p.style.background = "var(--light-gray)"; 
            }
            if(fc) fc.innerText = "✓";
            
            setTimeout(() => location.reload(), 30000);
        }

        loadData();
        setInterval(checkInbox, 3000);
    </script>
