<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="fit20-icon.png">
    <meta name="theme-color" content="#8BC63F">
    <title>fit20 Recovery</title>
    
    <style>
        :root { --fit20-green: #8BC63F; --antraciet: #333333; --light-gray: #f0f0f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #FFF; 
            color: var(--antraciet); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Secties */
        .top-section { height: 10vh; width: 100%; padding: 20px; display: flex; justify-content: flex-start; z-index: 10; }
        .middle-section { height: 65vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5vw; position: relative; }
        .bottom-section { height: 25vh; width: 100%; position: relative; display: flex; justify-content: center; align-items: flex-end; z-index: 10; }

        .logo { position: absolute; bottom: 30px; right: 30px; width: 25vw; max-width: 250px; z-index: 100; }
        #overallTimer { font-size: 3vw; font-weight: 700; color: #ddd; }
        .progress { position: absolute; bottom: 0; width: 100%; height: 12px; background: #eee; }
        #bar { width: 0%; height: 100%; background: var(--fit20-green); transition: width 1s linear; }

        /* Tekst elementen */
        .instruction-title { font-size: 4vw; font-weight: 700; margin-bottom: 2vh; text-align: center; }
        .sub-text { font-size: 2.2vw; color: #666; line-height: 1.5; max-width: 850px; text-align: center; margin-bottom: 3vh; min-height: 3em; }

        /* Cirkel Styling */
        .visual-circle { 
            width: 250px; 
            height: 250px; 
            border-radius: 50%; 
            background: conic-gradient(var(--fit20-green) 0deg, var(--light-gray) 0deg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            transition: transform 1s linear; 
        }
        .visual-circle::after { 
            content: ""; 
            width: 220px; 
            height: 220px; 
            background: white; 
            border-radius: 50%; 
            position: absolute; 
            z-index: 1; 
        }
        .circle-number { 
            z-index: 10; 
            font-size: 80px; 
            font-weight: 800; 
            color: var(--fit20-green); 
            position: relative; 
        }

        /* Box Breathing Layout */
        #boxBreathingLayout {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
        }
        .layout-left { flex: 2; display: flex; justify-content: center; align-items: center; padding-right: 2vw; }
        .layout-right { flex: 1; display: flex; justify-content: center; align-items: center; }
        
        .instruction-image {
            max-width: 100%;
            max-height: 50vh;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            object-fit: contain;
        }

        /* Countdown Grote Cijfers */
        #prepCountdown { font-size: 15vw; font-weight: 800; color: var(--fit20-green); margin-top: 2vh; }

        #startActionBtn { padding: 4vh 8vw; background: var(--fit20-green); color: white; border: none; border-radius: 20px; font-size: 4vw; font-weight: bold; cursor: pointer; box-shadow: 0 15px 30px rgba(139,198,63,0.4); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-section">
        <div id="overallTimer" class="hidden"><span id="timeVal">10:00</span></div>
    </div>

    <div class="middle-section" id="setupArea">
        <h1 id="userName" style="font-size: 6vw; margin-bottom: 2vh;">Laden...</h1>
        <p class="sub-text" id="personalMsg">Bezig met ophalen van data.</p>
        <button id="startActionBtn" class="hidden">START RECOVERY</button>
    </div>

    <div class="middle-section hidden" id="actionArea">
        <div class="instruction-title" id="mainTitle">...</div>
        <p class="sub-text" id="mainSubText">...</p>
        
        <div class="visual-circle" id="flowCircle">
            <div class="circle-number" id="flowCircleContent"></div>
        </div>

        <div id="prepCountdown" class="hidden">30</div>
    </div>

    <div class="middle-section hidden" id="breathingArea">
        <div class="instruction-title" id="breathTitle">Adem in</div>
        <p class="sub-text" id="breathSubText">Volg het ritme van de cirkel...</p>
        
        <div id="boxBreathingLayout">
            <div class="layout-left">
                <img src="box-breathe-instructie.png" class="instruction-image">
            </div>
            <div class="layout-right">
                <div class="visual-circle" id="breathCircle">
                    <div class="circle-number" id="breathCircleContent">1</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <img src="fit20-logo.png" class="logo">
        <div class="progress"><div id="bar"></div></div>
    </div>

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6';
        const MASTER_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym';
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR93iWmH6-aDPhu-8McxeU557j-_lgynBW3CVRJycKeaDDejXKIrO-rbXRlNqobtaXVCnZUvM0Z45yk/pub?gid=0&single=true&output=csv';

        let reservoir = [], sessionData = {}, selectedTexts = [], isSessionActive = false, overallSeconds = 600;

        async function loadReservoir() {
            try {
                let res = await fetch(SHEET_CSV_URL + '&t=' + Date.now());
                let csvText = await res.text();
                const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
                reservoir = lines.slice(1).map(line => {
                    const c = line.includes(';') ? line.split(';') : line.split(',');
                    return { cat: c[0]?.trim().toLowerCase(), gender: c[1]?.trim().toLowerCase(), profile: c[2]?.trim().toLowerCase(), title: c[3]?.trim(), text: c[4]?.trim() };
                });
                document.getElementById('userName').innerText = "Systeem Gereed";
                document.getElementById('personalMsg').innerText = "Wachten op trainer...";
            } catch (e) { document.getElementById('personalMsg').innerText = "Fout bij laden data."; }
        }
        loadReservoir();

        async function checkInbox() {
            if (isSessionActive || reservoir.length === 0) return;
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?t=${Date.now()}`, { headers: { 'X-Master-Key': MASTER_KEY } });
                const data = await res.json();
                if (data.record.user && data.record.program === 'recovery') {
                    sessionData = data.record;
                    document.getElementById('userName').innerText = "Hallo " + sessionData.user;
                    document.getElementById('personalMsg').innerText = "Neem plaats en druk op START.";
                    document.getElementById('startActionBtn').classList.remove('hidden');
                    // Selecteer alle categorieën a t/m j
                    selectedTexts = ["a","b","c","d","e","f","g","h","i","j"].reduce((acc, cat) => {
                        acc[cat] = pickText(cat);
                        return acc;
                    }, {});
                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify({ "user": "", "program": "idle", "genders":[], "profiles":[] }) });
                }
            } catch (e) {}
        }

        function pickText(category) {
            const userGender = sessionData.genders[0];
            const userProfiles = sessionData.profiles;
            const matches = reservoir.filter(t => t.cat === category && (t.gender === "both" || userGender === "both" || t.gender === userGender) && (t.profile === "all" || userProfiles.includes(t.profile)));
            return matches.length > 0 ? matches[Math.floor(Math.random() * matches.length)] : reservoir.find(t => t.cat === category);
        }

        document.getElementById('startActionBtn').addEventListener('click', function() {
            isSessionActive = true;
            document.getElementById('setupArea').classList.add('hidden');
            document.getElementById('overallTimer').classList.remove('hidden');
            document.getElementById('actionArea').classList.remove('hidden');
            
            const timerInt = setInterval(() => {
                let m = Math.floor(overallSeconds / 60), s = overallSeconds % 60;
                document.getElementById('timeVal').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                document.getElementById('bar').style.width = `${((600 - overallSeconds) / 600) * 100}%`;
                if (overallSeconds-- <= 0) { clearInterval(timerInt); location.reload(); }
            }, 1000);
            runMasterFlow();
        });

        function runMasterFlow() {
            const title = document.getElementById('mainTitle'), sub = document.getElementById('mainSubText'), pie = document.getElementById('flowCircle'), content = document.getElementById('flowCircleContent');
            let start = Date.now();

            const masterInt = setInterval(() => {
                let elapsed = Date.now() - start;

                // 1. FASE a-f (0-3 min)
                if (elapsed < 180000) {
                    let idx = Math.floor(elapsed / 30000);
                    let cats = ["a","b","c","d","e","f"];
                    updateUI(selectedTexts[cats[idx]], elapsed % 30000);
                } 
                // 2. RESULTATEN (3-4 min)
                else if (elapsed < 240000) {
                    title.innerText = "Jouw Trainingsresultaten";
                    sub.innerText = "Je hebt zojuist een uitstekende prikkel gegeven. Kijk hieronder hoe je vandaag hebt gepresteerd ten opzichte van vorige week.";
                    pie.classList.add('hidden');
                }
                // 3. FASE g-j (4-6 min)
                else if (elapsed < 360000) {
                    pie.classList.remove('hidden');
                    let idx = Math.floor((elapsed - 240000) / 30000);
                    let cats = ["g","h","i","j"];
                    updateUI(selectedTexts[cats[idx]], (elapsed - 240000) % 30000);
                }
                // 4. VOORBEREIDING (6:00 - 6:30)
                else if (elapsed < 390000) {
                    title.innerText = "Breng je adem tot rust";
                    sub.innerText = "Bereid je voor op de Box Breathing. Focus op een rustige neusademhaling.";
                    pie.classList.add('hidden');
                    document.getElementById('prepCountdown').classList.remove('hidden');
                    document.getElementById('prepCountdown').innerText = Math.ceil((390000 - elapsed) / 1000);
                }
                // 5. START BOX BREATHING
                else {
                    clearInterval(masterInt);
                    document.getElementById('actionArea').classList.add('hidden');
                    document.getElementById('breathingArea').classList.remove('hidden');
                    startBreathing();
                }
            }, 50);

            function updateUI(data, msInSegment) {
                if (!data) return;
                title.innerText = data.title;
                sub.innerText = data.text;
                let degrees = (msInSegment / 30000) * 360;
                pie.style.background = `conic-gradient(var(--fit20-green) ${degrees}deg, var(--light-gray) ${degrees}deg)`;
            }
        }

        function startBreathing() {
            const bTitle = document.getElementById('breathTitle'), bSub = document.getElementById('breathSubText'), bPie = document.getElementById('breathCircle'), bContent = document.getElementById('breathCircleContent');
            let totalTime = 210; // De resterende 3,5 minuut
            let step = 1, phase = 0;
            const phases = ["Adem in", "Vast houden", "Adem uit", "Vast houden"];

            const bInt = setInterval(() => {
                bTitle.innerText = phases[phase];
                bContent.innerText = step;
                
                if (phase === 0) bPie.style.transform = "scale(1.2)";
                if (phase === 2) bPie.style.transform = "scale(1.0)";

                if (step++ >= 4) { step = 1; phase = (phase + 1) % 4; }
                if (totalTime-- <= 0) { 
                    clearInterval(bInt); 
                    bTitle.innerText = "Optimaal Hersteld"; 
                    bContent.innerText = "✓"; 
                    setTimeout(() => location.reload(), 10000); 
                }
            }, 1000);
        }

        setInterval(checkInbox, 3000);
    </script>
</body>
</html>
