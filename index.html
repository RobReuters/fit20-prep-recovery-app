<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fit20 Recovery Station</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        /* Hier staat jouw fit20 styling (zwart, blauw, lettertypes) */
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 20vh; }
        #timer { font-size: 5rem; color: #00AEEF; font-weight: bold; }
        h1 { font-size: 2rem; }
    </style>
</head>
<body>

    <div id="content">
        <h1>Welkom bij fit20 Recovery</h1>
        <p>Wacht op activatie door je trainer...</p>
    </div>

    <script>
        const BIN_ID = '69d00c00856a682189f8b7f6'; // Vul hier je ID in
        const API_KEY = '$2a$10$qtn.qYbtTNwhtyhfhDsxVOd/Up7k8RpCA6YyI0GX5xKEycOKC3xym'; // Vul hier je Key in

        async function checkInbox() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await response.json();
                const record = data.record;

                // Als er een naam staat én het programma is 'recovery'
                if (record.user && record.program === 'recovery') {
                    startRecovery(record.user);
                    resetInbox(); // Belangrijk: zet de brievenbus weer op leeg
                }
            } catch (e) { console.error("Check mislukt:", e); }
        }

        function startRecovery(name) {
            // Dit vervangt de tekst op het scherm door de persoonlijke begroeting en de timer
            document.getElementById('content').innerHTML = `
                <h1>Hoi ${name}!</h1>
                <p>Geniet van je 10 minuten herstel.</p>
                <div id="timer">10:00</div>
            `;
            
            // Hier kun je jouw timer-aftel-functie aanroepen
            runTimer(600); 
        }

        async function resetInbox() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify({ "user": "", "program": "idle" })
            });
        }

        // Start de check elke 3 seconden
        setInterval(checkInbox, 3000);

        // Een simpele timer functie (voorbeeld)
        function runTimer(seconds) {
            let timeLeft = seconds;
            const display = document.getElementById('timer');
            const interval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) clearInterval(interval);
                timeLeft--;
            }, 1000);
        }
    </script>
</body>
</html>
